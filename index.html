<title>しろくまおたすけカード</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #e8f4f8;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas {
  display: block;
  margin: 0 auto;
}
</style>

<body>
<canvas id="game"></canvas>
<script>
'use strict';

// ============================================================
// 1. Canvas & Core Setup
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Design dimensions (portrait)
const DESIGN_W = 400;
const DESIGN_H = 700;
let scale = 1;
let offsetX = 0, offsetY = 0;

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const ratio = DESIGN_W / DESIGN_H;
  if (w / h < ratio) {
    canvas.width = w;
    canvas.height = w / ratio;
  } else {
    canvas.height = h;
    canvas.width = h * ratio;
  }
  scale = canvas.width / DESIGN_W;
  offsetX = (w - canvas.width) / 2;
  offsetY = (h - canvas.height) / 2;
  canvas.style.marginTop = offsetY + 'px';
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// 2. Input
// ============================================================
let inputX = -1, inputY = -1, inputTapped = false;

function toGameCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) / scale,
    y: (clientY - rect.top) / scale
  };
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  const p = toGameCoords(e.clientX, e.clientY);
  inputX = p.x; inputY = p.y; inputTapped = true;
});

function hitRect(x, y, rx, ry, rw, rh) {
  return x >= rx && x <= rx + rw && y >= ry && y <= ry + rh;
}

function hitCircle(x, y, cx, cy, r) {
  return (x - cx) ** 2 + (y - cy) ** 2 <= r * r;
}

// ============================================================
// 3. Audio (Web Audio API - procedural)
// ============================================================
let audioCtx = null;
let soundEnabled = true;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, dur, type = 'sine', vol = 0.3) {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function sfxCorrect() { playTone(523, 0.15, 'triangle'); setTimeout(() => playTone(659, 0.15, 'triangle'), 100); setTimeout(() => playTone(784, 0.2, 'triangle'), 200); }
function sfxWrong() { playTone(200, 0.3, 'square', 0.15); }
function sfxLaunch() { playTone(300, 0.1, 'sawtooth', 0.2); setTimeout(() => playTone(600, 0.3, 'sawtooth', 0.15), 50); }
function sfxHit() { playTone(150, 0.2, 'square', 0.2); playTone(100, 0.3, 'square', 0.15); }
function sfxBreak() { for (let i = 0; i < 5; i++) setTimeout(() => playTone(80 + Math.random() * 200, 0.2, 'square', 0.15), i * 60); }
function sfxRescue() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.3, 'triangle', 0.25), i * 150)); }
function sfxSynth() { [784, 988, 1175, 1319, 1568].forEach((f, i) => setTimeout(() => playTone(f, 0.4, 'sine', 0.2), i * 120)); }
function sfxCardGet() { playTone(660, 0.15, 'triangle'); setTimeout(() => playTone(880, 0.25, 'triangle'), 120); }
function sfxButton() { playTone(440, 0.08, 'triangle', 0.15); }

// ============================================================
// 4. Save/Load
// ============================================================
const SAVE_KEY = 'shirokuma_cards_v1';

const defaultSave = () => ({
  version: 2,
  clearedStages: [],
  ownedMaterials: {},  // { materialId: true }
  completedCards: {},  // { cardId: true }
  settings: { questionMode: 'mixed', sound: true },
  stats: { totalQuestions: 0, totalCorrect: 0 }
});

let saveData = defaultSave();

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d.version === 2) {
        saveData = d;
        soundEnabled = d.settings.sound;
      } else {
        // Old save version - reset
        saveData = defaultSave();
      }
    }
  } catch (e) { /* ignore */ }
}

function saveGame() {
  saveData.settings.sound = soundEnabled;
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(saveData)); } catch (e) { /* ignore */ }
}

loadGame();

// 200 Stages - rockets stay modest, difficulty comes from question types
const STAGES = [];
for (let i = 1; i <= 200; i++) {
  let level, drops;
  if (i <= 10) { level = 1; drops = 1; }
  else if (i <= 20) { level = 2; drops = 2; }
  else if (i <= 40) { level = 3; drops = 2; }
  else if (i <= 80) { level = 3; drops = 3; }
  else if (i <= 120) { level = 3; drops = 3; }
  else { level = 3; drops = 4; }
  // Rockets grow slowly: 3-8 max
  const rockets = Math.min(8, 3 + Math.floor(i / 15));
  const iceHP = rockets * 10;
  STAGES.push({ id: i, iceHP, rockets, level, drops });
}

// ============================================================
// 6. Particle System
// ============================================================
const particles = [];
const MAX_PARTICLES = 200;

function addParticle(x, y, type, color, vx, vy, life) {
  if (particles.length >= MAX_PARTICLES) return;
  particles.push({ x, y, type, color, vx, vy, life, maxLife: life, size: 3 + Math.random() * 4 });
}

function spawnIceShards(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    addParticle(x, y, 'shard', `hsl(${195 + Math.random()*20}, 80%, ${70+Math.random()*20}%)`,
      Math.cos(angle) * speed, Math.sin(angle) * speed - 2, 40 + Math.random() * 30);
  }
}

function spawnSparkles(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    const colors = ['#FFD700', '#FFF176', '#FFFFFF', '#FF80AB'];
    addParticle(x, y, 'sparkle', colors[Math.floor(Math.random() * colors.length)],
      Math.cos(angle) * speed, Math.sin(angle) * speed - 1, 50 + Math.random() * 40);
  }
}

function spawnHearts(x, y, count) {
  for (let i = 0; i < count; i++) {
    addParticle(x + (Math.random() - 0.5) * 60, y, 'heart', '#FF80AB',
      (Math.random() - 0.5) * 2, -1 - Math.random() * 2, 60 + Math.random() * 30);
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05; // gravity
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    if (p.type === 'sparkle') {
      ctx.fillStyle = p.color;
      const s = p.size * (1 + (1 - alpha) * 0.5);
      // star shape
      ctx.beginPath();
      for (let j = 0; j < 5; j++) {
        const a = (j * 72 - 90) * Math.PI / 180;
        const r = j % 2 === 0 ? s : s * 0.4;
        if (j === 0) ctx.moveTo(p.x + Math.cos(a) * r, p.y + Math.sin(a) * r);
        else ctx.lineTo(p.x + Math.cos(a) * r, p.y + Math.sin(a) * r);
      }
      ctx.fill();
    } else if (p.type === 'heart') {
      ctx.font = `${p.size * 3}px sans-serif`;
      ctx.fillText('💕', p.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// 7. Screen Shake
// ============================================================
let shakeIntensity = 0;
let shakeDuration = 0;

function triggerShake(intensity, duration) {
  shakeIntensity = intensity;
  shakeDuration = duration;
}

function applyShake() {
  if (shakeDuration > 0) {
    const dx = (Math.random() - 0.5) * shakeIntensity * 2;
    const dy = (Math.random() - 0.5) * shakeIntensity * 2;
    ctx.translate(dx, dy);
    shakeDuration--;
    if (shakeDuration <= 0) shakeIntensity = 0;
  }
}

// ============================================================
// 8. Drawing Helpers
// ============================================================

function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.closePath();
}

function drawButton(x, y, w, h, text, color = '#4FC3F7', textColor = '#FFF', fontSize = 24) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  drawRoundRect(x + 2, y + 2, w, h, 12);
  ctx.fill();
  // Button
  ctx.fillStyle = color;
  drawRoundRect(x, y, w, h, 12);
  ctx.fill();
  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Text
  ctx.fillStyle = textColor;
  ctx.font = `bold ${fontSize}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x + w / 2, y + h / 2);
}

function drawBear(x, y, size, happy = false) {
  const s = size;
  // Body
  ctx.fillStyle = '#FAFAFA';
  ctx.beginPath();
  ctx.ellipse(x, y + s * 0.3, s * 0.5, s * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#DDD';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Head
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(x, y - s * 0.3, s * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // Ears
  ctx.fillStyle = '#F5F5F5';
  ctx.beginPath();
  ctx.arc(x - s * 0.28, y - s * 0.6, s * 0.14, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x + s * 0.28, y - s * 0.6, s * 0.14, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // Inner ears
  ctx.fillStyle = '#FFCDD2';
  ctx.beginPath();
  ctx.arc(x - s * 0.28, y - s * 0.6, s * 0.07, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + s * 0.28, y - s * 0.6, s * 0.07, 0, Math.PI * 2);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#333';
  if (happy) {
    // Happy eyes (arcs)
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#333';
    ctx.beginPath();
    ctx.arc(x - s * 0.12, y - s * 0.35, s * 0.06, 0, Math.PI, true);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x + s * 0.12, y - s * 0.35, s * 0.06, 0, Math.PI, true);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(x - s * 0.12, y - s * 0.35, s * 0.05, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + s * 0.12, y - s * 0.35, s * 0.05, 0, Math.PI * 2);
    ctx.fill();
    // Eye shine
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(x - s * 0.1, y - s * 0.37, s * 0.02, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + s * 0.14, y - s * 0.37, s * 0.02, 0, Math.PI * 2);
    ctx.fill();
  }
  // Nose
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.ellipse(x, y - s * 0.22, s * 0.06, s * 0.04, 0, 0, Math.PI * 2);
  ctx.fill();
  // Mouth
  if (happy) {
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y - s * 0.18, s * 0.08, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();
  }
  // Arms
  ctx.fillStyle = '#FAFAFA';
  ctx.beginPath();
  ctx.ellipse(x - s * 0.45, y + s * 0.15, s * 0.12, s * 0.25, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#DDD';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + s * 0.45, y + s * 0.15, s * 0.12, s * 0.25, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
}

function drawIceBlock(x, y, w, h, hpRatio, crackLevel) {
  // Main ice
  ctx.fillStyle = `rgba(180, 225, 255, ${0.5 + hpRatio * 0.3})`;
  ctx.strokeStyle = 'rgba(100, 180, 220, 0.6)';
  ctx.lineWidth = 2;
  drawRoundRect(x, y, w, h, 8);
  ctx.fill();
  ctx.stroke();

  // Inner glow
  const grad = ctx.createRadialGradient(x + w/2, y + h/2, 0, x + w/2, y + h/2, w * 0.6);
  grad.addColorStop(0, 'rgba(255,255,255,0.3)');
  grad.addColorStop(1, 'rgba(180,225,255,0)');
  ctx.fillStyle = grad;
  drawRoundRect(x, y, w, h, 8);
  ctx.fill();

  // Cracks based on damage
  if (crackLevel > 0) {
    ctx.strokeStyle = 'rgba(60, 140, 180, 0.5)';
    ctx.lineWidth = 1.5;
    const cx = x + w / 2, cy = y + h / 2;
    const cracks = Math.min(crackLevel, 8);
    const seed = 42; // consistent cracks
    for (let i = 0; i < cracks; i++) {
      ctx.beginPath();
      const angle = (i / cracks) * Math.PI * 2 + (seed * i % 1);
      let px = cx, py = cy;
      ctx.moveTo(px, py);
      const segments = 2 + Math.floor(crackLevel / 2);
      for (let j = 0; j < segments; j++) {
        const dist = (j + 1) * (Math.min(w, h) * 0.15);
        px = cx + Math.cos(angle + (j * 0.3 - 0.15)) * dist;
        py = cy + Math.sin(angle + (j * 0.3 - 0.15)) * dist;
        // Clamp to ice bounds
        px = Math.max(x + 4, Math.min(x + w - 4, px));
        py = Math.max(y + 4, Math.min(y + h - 4, py));
        ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
  }
}

function drawRocket(x, y, size, angle = -Math.PI / 2) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle + Math.PI / 2);
  const s = size;
  // Body
  ctx.fillStyle = '#FF5722';
  ctx.beginPath();
  ctx.moveTo(0, -s);
  ctx.lineTo(-s * 0.3, s * 0.3);
  ctx.lineTo(s * 0.3, s * 0.3);
  ctx.closePath();
  ctx.fill();
  // Nose
  ctx.fillStyle = '#FFEB3B';
  ctx.beginPath();
  ctx.arc(0, -s * 0.4, s * 0.2, 0, Math.PI * 2);
  ctx.fill();
  // Window
  ctx.fillStyle = '#81D4FA';
  ctx.beginPath();
  ctx.arc(0, -s * 0.2, s * 0.1, 0, Math.PI * 2);
  ctx.fill();
  // Fins
  ctx.fillStyle = '#FF7043';
  ctx.beginPath();
  ctx.moveTo(-s * 0.3, s * 0.2);
  ctx.lineTo(-s * 0.5, s * 0.5);
  ctx.lineTo(-s * 0.15, s * 0.3);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(s * 0.3, s * 0.2);
  ctx.lineTo(s * 0.5, s * 0.5);
  ctx.lineTo(s * 0.15, s * 0.3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawWordPicture(cx, cy, type, size) {
  const img = QUIZ_IMG_CACHE[type];
  if (img && img.complete) {
    ctx.drawImage(img, cx - size/2, cy - size/2, size, size);
    return;
  }
  // Fallback: draw simple colored circle with first letter
  ctx.fillStyle = '#DDD';
  ctx.beginPath(); ctx.arc(cx, cy, size*0.4, 0, Math.PI*2); ctx.fill();
  return;
  // Legacy canvas drawing below (kept but unreachable)
  const s = size;
  ctx.save();
  if (type === 'bear') {
    drawBear(cx, cy, s * 0.7, true);
  } else if (type === 'sea') {
    // waves
    ctx.strokeStyle = '#1E88E5';
    ctx.lineWidth = 3;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      for (let x = -s; x <= s; x += 2) {
        ctx.lineTo(cx + x, cy + i * 12 - 10 + Math.sin(x * 0.1) * 6);
      }
      ctx.stroke();
    }
  } else if (type === 'dog') {
    ctx.fillStyle = '#8D6E63';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.35, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#5D4037';
    ctx.beginPath(); ctx.ellipse(cx-s*0.25, cy-s*0.3, s*0.15, s*0.2, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+s*0.25, cy-s*0.3, s*0.15, s*0.2, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx-s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy+s*0.08, 4, 0, Math.PI*2); ctx.fill();
  } else if (type === 'rain') {
    ctx.fillStyle = '#90CAF9';
    for (let i = 0; i < 6; i++) {
      const rx = cx + (i%3-1)*15, ry = cy + (Math.floor(i/3))*18 - 10;
      ctx.beginPath(); ctx.ellipse(rx, ry, 3, 7, 0, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#78909C';
    ctx.beginPath();
    ctx.ellipse(cx, cy-s*0.3, s*0.4, s*0.2, 0, 0, Math.PI*2);
    ctx.fill();
  } else if (type === 'oni') {
    ctx.fillStyle = '#EF5350';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(cx-s*0.1, cy-s*0.05, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.1, cy-s*0.05, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFEB3B';
    ctx.beginPath(); ctx.moveTo(cx-s*0.12, cy-s*0.3); ctx.lineTo(cx-s*0.08, cy-s*0.5); ctx.lineTo(cx-s*0.04, cy-s*0.3); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+s*0.04, cy-s*0.3); ctx.lineTo(cx+s*0.08, cy-s*0.5); ctx.lineTo(cx+s*0.12, cy-s*0.3); ctx.fill();
  } else if (type === 'station') {
    ctx.fillStyle = '#78909C';
    ctx.fillRect(cx-s*0.3, cy-s*0.2, s*0.6, s*0.4);
    ctx.fillStyle = '#B0BEC5';
    ctx.fillRect(cx-s*0.35, cy-s*0.25, s*0.7, s*0.08);
    ctx.fillStyle = '#FFF';
    ctx.fillRect(cx-s*0.15, cy-s*0.1, s*0.12, s*0.15);
    ctx.fillRect(cx+s*0.05, cy-s*0.1, s*0.12, s*0.15);
  } else if (type === 'crab') {
    ctx.fillStyle = '#EF5350';
    ctx.beginPath(); ctx.ellipse(cx, cy, s*0.3, s*0.2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx-s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#EF5350'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx-s*0.3,cy); ctx.lineTo(cx-s*0.5,cy-s*0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+s*0.3,cy); ctx.lineTo(cx+s*0.5,cy-s*0.2); ctx.stroke();
  } else if (type === 'fox') {
    ctx.fillStyle = '#FF8F00';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(cx, cy+s*0.1, s*0.15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx-s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    // ears
    ctx.fillStyle = '#FF8F00';
    ctx.beginPath(); ctx.moveTo(cx-s*0.2,cy-s*0.25); ctx.lineTo(cx-s*0.35,cy-s*0.5); ctx.lineTo(cx-s*0.05,cy-s*0.25); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+s*0.2,cy-s*0.25); ctx.lineTo(cx+s*0.35,cy-s*0.5); ctx.lineTo(cx+s*0.05,cy-s*0.25); ctx.fill();
  } else if (type === 'fish') {
    ctx.fillStyle = '#42A5F5';
    ctx.beginPath(); ctx.ellipse(cx, cy, s*0.35, s*0.18, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+s*0.3,cy); ctx.lineTo(cx+s*0.5,cy-s*0.15); ctx.lineTo(cx+s*0.5,cy+s*0.15); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(cx-s*0.15, cy-s*0.03, 3, 0, Math.PI*2); ctx.fill();
  } else if (type === 'deer') {
    ctx.fillStyle = '#8D6E63';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx-s*0.1, cy, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.1, cy, 3, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#5D4037'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx-s*0.1,cy-s*0.3); ctx.lineTo(cx-s*0.15,cy-s*0.5); ctx.lineTo(cx-s*0.25,cy-s*0.55); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+s*0.1,cy-s*0.3); ctx.lineTo(cx+s*0.15,cy-s*0.5); ctx.lineTo(cx+s*0.25,cy-s*0.55); ctx.stroke();
  } else if (type === 'ice') {
    ctx.fillStyle = 'rgba(180,225,255,0.7)';
    drawRoundRect(cx-s*0.25, cy-s*0.3, s*0.5, s*0.6, 4);
    ctx.fill();
    ctx.strokeStyle = 'rgba(100,180,220,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
  } else if (type === 'cake') {
    ctx.fillStyle = '#FFCCBC';
    ctx.fillRect(cx-s*0.25, cy-s*0.1, s*0.5, s*0.3);
    ctx.fillStyle = '#FFF';
    ctx.fillRect(cx-s*0.25, cy-s*0.15, s*0.5, s*0.08);
    ctx.fillStyle = '#EF5350';
    ctx.beginPath(); ctx.arc(cx, cy-s*0.2, s*0.05, 0, Math.PI*2); ctx.fill();
  } else if (type === 'watermelon') {
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#E53935';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.25, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    for (let i = 0; i < 5; i++) { ctx.beginPath(); ctx.arc(cx+(i-2)*6, cy, 2, 0, Math.PI*2); ctx.fill(); }
  } else if (type === 'octopus') {
    ctx.fillStyle = '#E91E63';
    ctx.beginPath(); ctx.arc(cx, cy-s*0.1, s*0.25, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(cx-s*0.08, cy-s*0.15, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.08, cy-s*0.15, 4, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#E91E63'; ctx.lineWidth = 3;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      const ox = cx + (i-1.5)*10;
      ctx.moveTo(ox, cy+s*0.1); ctx.quadraticCurveTo(ox+5, cy+s*0.3, ox-3, cy+s*0.35);
      ctx.stroke();
    }
  } else if (type === 'moon') {
    ctx.fillStyle = '#FFEB3B';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#E3F2FD';
    ctx.beginPath(); ctx.arc(cx+s*0.12, cy-s*0.05, s*0.25, 0, Math.PI*2); ctx.fill();
  } else if (type === 'cat') {
    ctx.fillStyle = '#FFB74D';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx-s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFB74D';
    ctx.beginPath(); ctx.moveTo(cx-s*0.2,cy-s*0.25); ctx.lineTo(cx-s*0.3,cy-s*0.5); ctx.lineTo(cx-s*0.05,cy-s*0.28); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+s*0.2,cy-s*0.25); ctx.lineTo(cx+s*0.3,cy-s*0.5); ctx.lineTo(cx+s*0.05,cy-s*0.28); ctx.fill();
    // whiskers
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx-s*0.15,cy+s*0.05); ctx.lineTo(cx-s*0.4,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+s*0.15,cy+s*0.05); ctx.lineTo(cx+s*0.4,cy); ctx.stroke();
  } else if (type === 'flower') {
    const petals = ['#FF80AB','#FF4081','#F48FB1','#FF80AB','#FF4081'];
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = petals[i];
      const a = i * Math.PI * 2 / 5 - Math.PI/2;
      ctx.beginPath(); ctx.arc(cx+Math.cos(a)*s*0.15, cy+Math.sin(a)*s*0.15, s*0.12, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#FFEB3B';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.1, 0, Math.PI*2); ctx.fill();
  } else if (type === 'star') {
    ctx.fillStyle = '#FFEB3B';
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = (i * 36 - 90) * Math.PI / 180;
      const r = i % 2 === 0 ? s*0.35 : s*0.15;
      if (i===0) ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
      else ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    }
    ctx.fill();
  }
  ctx.restore();
}

function drawMaterialIcon(cx, cy, matId, size) {
  const s = size;
  // Unique material icons based on name/theme
  const matIcons = {
    // koguma materials
    koguma_foot: (cx,cy,s) => { // paw print
      ctx.fillStyle = '#8D6E63';
      ctx.beginPath(); ctx.ellipse(cx, cy+s*0.1, s*0.2, s*0.25, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx-s*0.15, cy-s*0.2, s*0.08, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+s*0.15, cy-s*0.2, s*0.08, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy-s*0.28, s*0.06, 0, Math.PI*2); ctx.fill();
    },
    koguma_fur: (cx,cy,s) => { // fluffy ball
      ctx.fillStyle = '#F5F5F5'; ctx.beginPath(); ctx.arc(cx, cy, s*0.25, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#DDD'; ctx.lineWidth = 1;
      for (let i = 0; i < 6; i++) { const a = i*Math.PI/3; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a)*s*0.3,cy+Math.sin(a)*s*0.3); ctx.stroke(); }
    },
    koguma_ribbon: (cx,cy,s) => { // red ribbon
      ctx.fillStyle = '#EF5350';
      ctx.beginPath(); ctx.ellipse(cx-s*0.12, cy, s*0.15, s*0.1, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+s*0.12, cy, s*0.15, s*0.1, 0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#C62828'; ctx.beginPath(); ctx.arc(cx, cy, s*0.06, 0, Math.PI*2); ctx.fill();
    },
    // osanpo materials
    osanpo_scarf: (cx,cy,s) => { // red scarf
      ctx.fillStyle = '#EF5350'; ctx.fillRect(cx-s*0.25, cy-s*0.08, s*0.5, s*0.16);
      ctx.fillRect(cx+s*0.1, cy+s*0.05, s*0.1, s*0.25);
      ctx.strokeStyle = '#C62828'; ctx.lineWidth = 1; ctx.strokeRect(cx-s*0.25, cy-s*0.08, s*0.5, s*0.16);
    },
    osanpo_leaf: (cx,cy,s) => { // green leaf
      ctx.fillStyle = '#66BB6A'; ctx.beginPath(); ctx.ellipse(cx, cy, s*0.12, s*0.25, 0.3, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#2E7D32'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(cx-s*0.05,cy+s*0.2); ctx.lineTo(cx+s*0.05,cy-s*0.2); ctx.stroke();
    },
    osanpo_bell: (cx,cy,s) => { // golden bell
      ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(cx, cy-s*0.05, s*0.18, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFA000'; ctx.beginPath(); ctx.arc(cx, cy+s*0.15, s*0.06, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#E65100'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(cx,cy-s*0.25); ctx.lineTo(cx,cy-s*0.35); ctx.stroke();
    },
    // hoshizora materials
    hoshi_dust: (cx,cy,s) => { // star fragment
      ctx.fillStyle = '#FFD700'; for (let i = 0; i < 3; i++) {
        const ox = (i-1)*s*0.18, oy = (i%2)*s*0.1;
        ctx.beginPath(); for(let j=0;j<10;j++){const a=(j*36-90)*Math.PI/180;const r=j%2===0?s*0.1:s*0.04;if(j===0)ctx.moveTo(cx+ox+Math.cos(a)*r,cy+oy+Math.sin(a)*r);else ctx.lineTo(cx+ox+Math.cos(a)*r,cy+oy+Math.sin(a)*r);}ctx.fill();
      }
    },
    hoshi_map: (cx,cy,s) => { // constellation map
      ctx.fillStyle = '#1A237E'; drawRoundRect(cx-s*0.22, cy-s*0.25, s*0.44, s*0.5, 3); ctx.fill();
      ctx.fillStyle = '#FFF'; for (let i = 0; i < 5; i++) { ctx.beginPath(); ctx.arc(cx+(i%3-1)*s*0.12, cy+(Math.floor(i/3)-0.5)*s*0.15, 2, 0, Math.PI*2); ctx.fill(); }
      ctx.strokeStyle = '#FFF8'; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(cx-s*0.12,cy-s*0.1); ctx.lineTo(cx,cy+s*0.05); ctx.lineTo(cx+s*0.12,cy-s*0.1); ctx.stroke();
    },
    hoshi_tear: (cx,cy,s) => { // star teardrop
      ctx.fillStyle = '#81D4FA'; ctx.beginPath(); ctx.moveTo(cx,cy-s*0.25); ctx.quadraticCurveTo(cx+s*0.15,cy,cx,cy+s*0.2); ctx.quadraticCurveTo(cx-s*0.15,cy,cx,cy-s*0.25); ctx.fill();
      ctx.fillStyle = '#FFF8'; ctx.beginPath(); ctx.arc(cx-s*0.03,cy-s*0.05,s*0.04,0,Math.PI*2); ctx.fill();
    },
    // oyasumi materials
    oyasu_pillow: (cx,cy,s) => { // pillow
      ctx.fillStyle = '#E1BEE7'; drawRoundRect(cx-s*0.25, cy-s*0.12, s*0.5, s*0.24, 8); ctx.fill();
      ctx.strokeStyle = '#CE93D8'; ctx.lineWidth = 1; ctx.stroke();
    },
    oyasu_blanket: (cx,cy,s) => { // blanket
      ctx.fillStyle = '#90CAF9'; drawRoundRect(cx-s*0.22, cy-s*0.18, s*0.44, s*0.36, 4); ctx.fill();
      ctx.fillStyle = '#64B5F6'; ctx.fillRect(cx-s*0.22, cy-s*0.18, s*0.44, s*0.08);
    },
    oyasu_moon: (cx,cy,s) => { // crescent moon
      ctx.fillStyle = '#FFEB3B'; ctx.beginPath(); ctx.arc(cx,cy,s*0.22,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#E1BEE7'; ctx.beginPath(); ctx.arc(cx+s*0.1,cy-s*0.05,s*0.18,0,Math.PI*2); ctx.fill();
    },
    oyasu_lullaby: (cx,cy,s) => { // music notes
      ctx.fillStyle = '#7E57C2';
      ctx.beginPath(); ctx.arc(cx-s*0.1,cy+s*0.05,s*0.08,0,Math.PI*2); ctx.fill();
      ctx.fillRect(cx-s*0.1+s*0.06,cy-s*0.2,2,s*0.25);
      ctx.beginPath(); ctx.arc(cx+s*0.12,cy-s*0.05,s*0.07,0,Math.PI*2); ctx.fill();
      ctx.fillRect(cx+s*0.12+s*0.05,cy-s*0.3,2,s*0.25);
    },
    // ousama materials
    king_crown: (cx,cy,s) => { // golden crown
      ctx.fillStyle = '#FFD700'; ctx.beginPath();
      ctx.moveTo(cx-s*0.22,cy+s*0.1); ctx.lineTo(cx-s*0.22,cy-s*0.05); ctx.lineTo(cx-s*0.1,cy+s*0.05);
      ctx.lineTo(cx,cy-s*0.15); ctx.lineTo(cx+s*0.1,cy+s*0.05); ctx.lineTo(cx+s*0.22,cy-s*0.05);
      ctx.lineTo(cx+s*0.22,cy+s*0.1); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#EF5350'; ctx.beginPath(); ctx.arc(cx,cy-s*0.08,s*0.04,0,Math.PI*2); ctx.fill();
    },
    king_cape: (cx,cy,s) => { // red cape
      ctx.fillStyle = '#D32F2F'; ctx.beginPath(); ctx.moveTo(cx-s*0.15,cy-s*0.2); ctx.lineTo(cx-s*0.25,cy+s*0.25);
      ctx.lineTo(cx+s*0.25,cy+s*0.25); ctx.lineTo(cx+s*0.15,cy-s*0.2); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#FFF'; ctx.fillRect(cx-s*0.15,cy-s*0.2,s*0.3,s*0.06);
    },
    king_scepter: (cx,cy,s) => { // royal scepter
      ctx.fillStyle = '#FFD700'; ctx.fillRect(cx-s*0.03,cy-s*0.15,s*0.06,s*0.4);
      ctx.beginPath(); ctx.arc(cx,cy-s*0.2,s*0.1,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#42A5F5'; ctx.beginPath(); ctx.arc(cx,cy-s*0.2,s*0.05,0,Math.PI*2); ctx.fill();
    },
    king_throne: (cx,cy,s) => { // ice throne
      ctx.fillStyle = '#B3E5FC'; ctx.fillRect(cx-s*0.2,cy-s*0.05,s*0.4,s*0.25);
      ctx.fillRect(cx-s*0.2,cy-s*0.25,s*0.08,s*0.45); ctx.fillRect(cx+s*0.12,cy-s*0.25,s*0.08,s*0.45);
      ctx.fillRect(cx-s*0.2,cy-s*0.25,s*0.4,s*0.08);
    },
    // ouji materials
    ouji_light: (cx,cy,s) => { // aurora light
      const colors = ['#E040FB','#7C4DFF','#40C4FF','#69F0AE'];
      for (let i = 0; i < 4; i++) { ctx.strokeStyle = colors[i]; ctx.lineWidth = 2.5; ctx.globalAlpha = 0.7;
        ctx.beginPath(); for (let x=-s*0.3;x<=s*0.3;x+=2){const y=Math.sin(x*0.2+i)*s*0.08;if(x===-s*0.3)ctx.moveTo(cx+x,cy+i*4-6+y);else ctx.lineTo(cx+x,cy+i*4-6+y);}ctx.stroke(); }
      ctx.globalAlpha = 1;
    },
    ouji_crystal: (cx,cy,s) => { // rainbow crystal
      ctx.fillStyle = '#CE93D8'; ctx.beginPath();
      ctx.moveTo(cx,cy-s*0.28); ctx.lineTo(cx+s*0.18,cy); ctx.lineTo(cx+s*0.1,cy+s*0.2);
      ctx.lineTo(cx-s*0.1,cy+s*0.2); ctx.lineTo(cx-s*0.18,cy); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#FFF4'; ctx.beginPath(); ctx.moveTo(cx,cy-s*0.28); ctx.lineTo(cx+s*0.05,cy); ctx.lineTo(cx-s*0.05,cy); ctx.fill();
    },
    ouji_wing: (cx,cy,s) => { // light wing
      ctx.fillStyle = '#E1BEE7'; ctx.beginPath();
      ctx.moveTo(cx,cy); ctx.quadraticCurveTo(cx-s*0.3,cy-s*0.3,cx-s*0.05,cy-s*0.3);
      ctx.quadraticCurveTo(cx+s*0.15,cy-s*0.25,cx,cy); ctx.fill();
      ctx.fillStyle = '#F3E5F5'; ctx.beginPath();
      ctx.moveTo(cx,cy); ctx.quadraticCurveTo(cx+s*0.3,cy-s*0.2,cx+s*0.1,cy-s*0.25);
      ctx.quadraticCurveTo(cx-s*0.05,cy-s*0.15,cx,cy); ctx.fill();
    },
    ouji_tiara: (cx,cy,s) => { // star tiara
      ctx.fillStyle = '#B39DDB'; drawRoundRect(cx-s*0.22,cy+s*0.02,s*0.44,s*0.08,4); ctx.fill();
      ctx.fillStyle = '#FFD700'; ctx.beginPath();
      for(let j=0;j<10;j++){const a=(j*36-90)*Math.PI/180;const r=j%2===0?s*0.15:s*0.06;if(j===0)ctx.moveTo(cx+Math.cos(a)*r,cy-s*0.08+Math.sin(a)*r);else ctx.lineTo(cx+Math.cos(a)*r,cy-s*0.08+Math.sin(a)*r);}ctx.fill();
    },
    ouji_gem: (cx,cy,s) => { // sky gem
      ctx.fillStyle = '#64B5F6'; ctx.beginPath();
      ctx.moveTo(cx,cy-s*0.22); ctx.lineTo(cx+s*0.2,cy-s*0.05); ctx.lineTo(cx+s*0.12,cy+s*0.18);
      ctx.lineTo(cx-s*0.12,cy+s*0.18); ctx.lineTo(cx-s*0.2,cy-s*0.05); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#FFF4'; ctx.beginPath(); ctx.moveTo(cx,cy-s*0.22); ctx.lineTo(cx+s*0.08,cy); ctx.lineTo(cx-s*0.08,cy); ctx.fill();
    },
    // densetsu materials
    den_wing: (cx,cy,s) => { // legendary wing
      ctx.fillStyle = '#FFD700'; ctx.beginPath();
      ctx.moveTo(cx,cy+s*0.1); ctx.quadraticCurveTo(cx-s*0.35,cy-s*0.2,cx-s*0.1,cy-s*0.3);
      ctx.quadraticCurveTo(cx+s*0.1,cy-s*0.15,cx,cy+s*0.1); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx,cy+s*0.1); ctx.quadraticCurveTo(cx+s*0.35,cy-s*0.2,cx+s*0.1,cy-s*0.3);
      ctx.quadraticCurveTo(cx-s*0.1,cy-s*0.15,cx,cy+s*0.1); ctx.fill();
    },
    den_halo: (cx,cy,s) => { // rainbow ring
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3; ctx.beginPath(); ctx.ellipse(cx,cy,s*0.25,s*0.1,0,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle = '#E040FB'; ctx.lineWidth = 2; ctx.beginPath(); ctx.ellipse(cx,cy-s*0.02,s*0.2,s*0.08,0,0,Math.PI*2); ctx.stroke();
    },
    den_heart: (cx,cy,s) => { // eternal heart
      ctx.fillStyle = '#E040FB'; ctx.beginPath();
      ctx.moveTo(cx,cy+s*0.15); ctx.bezierCurveTo(cx-s*0.3,cy-s*0.05,cx-s*0.15,cy-s*0.25,cx,cy-s*0.1);
      ctx.bezierCurveTo(cx+s*0.15,cy-s*0.25,cx+s*0.3,cy-s*0.05,cx,cy+s*0.15); ctx.fill();
      ctx.fillStyle = '#FFF4'; ctx.beginPath(); ctx.arc(cx-s*0.08,cy-s*0.1,s*0.04,0,Math.PI*2); ctx.fill();
    },
    den_star: (cx,cy,s) => { // miracle star
      ctx.fillStyle = '#FFD700'; ctx.beginPath();
      for(let j=0;j<10;j++){const a=(j*36-90)*Math.PI/180;const r=j%2===0?s*0.28:s*0.12;if(j===0)ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);else ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}ctx.fill();
      ctx.fillStyle = '#FFF8'; ctx.beginPath(); ctx.arc(cx,cy,s*0.06,0,Math.PI*2); ctx.fill();
    },
    den_crown: (cx,cy,s) => { // legendary crown
      ctx.fillStyle = '#E040FB'; ctx.beginPath();
      ctx.moveTo(cx-s*0.25,cy+s*0.1); ctx.lineTo(cx-s*0.25,cy-s*0.08); ctx.lineTo(cx-s*0.12,cy+s*0.02);
      ctx.lineTo(cx,cy-s*0.18); ctx.lineTo(cx+s*0.12,cy+s*0.02); ctx.lineTo(cx+s*0.25,cy-s*0.08);
      ctx.lineTo(cx+s*0.25,cy+s*0.1); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(cx,cy-s*0.1,s*0.05,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx-s*0.15,cy-s*0.02,s*0.03,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+s*0.15,cy-s*0.02,s*0.03,0,Math.PI*2); ctx.fill();
    },
  };

  if (matIcons[matId]) { matIcons[matId](cx, cy, s); return; }

  // Auto-icon: match keywords in material name → shape, colored by parent card
  const mat = MATERIALS.find(m => m.id === matId);
  if (mat) {
    const card = RECIPES.find(r => r.id === mat.cardId);
    const col = card ? card.color : '#90CAF9';
    const name = mat.name;
    const r = s * 0.28;

    // Keyword → shape mapping
    if (name.includes('あしあと') || name.includes('にくきゅう') || name.includes('あし')) {
      ctx.fillStyle = col; ctx.beginPath(); ctx.ellipse(cx,cy+r*0.2,r*0.7,r,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx-r*0.5,cy-r*0.7,r*0.3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+r*0.5,cy-r*0.7,r*0.3,0,Math.PI*2); ctx.fill();
    } else if (name.includes('おうかん') || name.includes('かんむり') || name.includes('ティアラ')) {
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(cx-r,cy+r*0.3); ctx.lineTo(cx-r,cy-r*0.2); ctx.lineTo(cx-r*0.4,cy+r*0.1);
      ctx.lineTo(cx,cy-r); ctx.lineTo(cx+r*0.4,cy+r*0.1); ctx.lineTo(cx+r,cy-r*0.2);
      ctx.lineTo(cx+r,cy+r*0.3); ctx.closePath(); ctx.fill();
    } else if (name.includes('ほし') || name.includes('きせき') || name.includes('またたき') || name.includes('ちょうしんせい')) {
      ctx.fillStyle = col; ctx.beginPath();
      for(let j=0;j<10;j++){const a=(j*36-90)*Math.PI/180;const sr=j%2===0?r:r*0.4;if(j===0)ctx.moveTo(cx+Math.cos(a)*sr,cy+Math.sin(a)*sr);else ctx.lineTo(cx+Math.cos(a)*sr,cy+Math.sin(a)*sr);}ctx.fill();
    } else if (name.includes('しずく') || name.includes('なみだ') || name.includes('みず') || name.includes('あわ') || name.includes('つゆ')) {
      ctx.fillStyle = col; ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.quadraticCurveTo(cx+r,cy+r*0.3,cx,cy+r); ctx.quadraticCurveTo(cx-r,cy+r*0.3,cx,cy-r); ctx.fill();
    } else if (name.includes('ほうせき') || name.includes('クリスタル') || name.includes('すいしょう') || name.includes('ルビー') || name.includes('ダイヤ') || name.includes('いんせき') || name.includes('しんじゅ')) {
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r*0.8,cy-r*0.2); ctx.lineTo(cx+r*0.5,cy+r);
      ctx.lineTo(cx-r*0.5,cy+r); ctx.lineTo(cx-r*0.8,cy-r*0.2); ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r*0.3,cy); ctx.lineTo(cx-r*0.3,cy); ctx.fill();
    } else if (name.includes('カギ') || name.includes('かぎ')) {
      ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx,cy-r*0.4,r*0.5,0,Math.PI*2); ctx.fill();
      ctx.fillRect(cx-r*0.15,cy-r*0.1,r*0.3,r*1.1);
      ctx.fillRect(cx,cy+r*0.6,r*0.4,r*0.2);
    } else if (name.includes('ほん') || name.includes('えほん') || name.includes('にっき') || name.includes('まきもの') || name.includes('グリモワール')) {
      ctx.fillStyle = col; drawRoundRect(cx-r*0.7,cy-r*0.8,r*1.4,r*1.6,3); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(cx-r*0.5,cy-r*0.5,r*1,r*0.15);
      ctx.fillRect(cx-r*0.5,cy-r*0.1,r*0.8,r*0.15);
    } else if (name.includes('はね') || name.includes('つばさ')) {
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(cx,cy+r*0.5); ctx.quadraticCurveTo(cx-r*1.2,cy-r*0.5,cx-r*0.2,cy-r);
      ctx.quadraticCurveTo(cx+r*0.3,cy-r*0.3,cx,cy+r*0.5); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx,cy+r*0.5); ctx.quadraticCurveTo(cx+r*1.2,cy-r*0.5,cx+r*0.2,cy-r);
      ctx.quadraticCurveTo(cx-r*0.3,cy-r*0.3,cx,cy+r*0.5); ctx.fill();
    } else if (name.includes('マント') || name.includes('ローブ') || name.includes('ころも') || name.includes('きぬ') || name.includes('ヴェール') || name.includes('ふく') || name.includes('パジャマ')) {
      ctx.fillStyle = col; ctx.beginPath(); ctx.moveTo(cx-r*0.5,cy-r); ctx.lineTo(cx-r,cy+r);
      ctx.lineTo(cx+r,cy+r); ctx.lineTo(cx+r*0.5,cy-r); ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(cx-r*0.5,cy-r,r*1,r*0.2);
    } else if (name.includes('ぼうし') || name.includes('ヘルメット')) {
      ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx,cy-r*0.1,r*0.7,Math.PI,0); ctx.fill();
      ctx.fillRect(cx-r,cy-r*0.1,r*2,r*0.3);
    } else if (name.includes('つえ') || name.includes('ステッキ')) {
      ctx.fillStyle = col; ctx.fillRect(cx-r*0.1,cy-r,r*0.2,r*2);
      ctx.beginPath(); ctx.arc(cx,cy-r,r*0.35,0,Math.PI*2); ctx.fill();
    } else if (name.includes('すず') || name.includes('おと') || name.includes('こもりうた') || name.includes('ハープ') || name.includes('オルゴール')) {
      ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx,cy,r*0.6,0,Math.PI*2); ctx.fill();
      ctx.fillRect(cx-r*0.08,cy-r,r*0.16,r*0.5);
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.arc(cx-r*0.15,cy-r*0.15,r*0.15,0,Math.PI*2); ctx.fill();
    } else if (name.includes('ゆびわ') || name.includes('わ') && name.length < 6) {
      ctx.strokeStyle = col; ctx.lineWidth = r*0.3; ctx.beginPath(); ctx.arc(cx,cy,r*0.6,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx,cy-r*0.6,r*0.25,0,Math.PI*2); ctx.fill();
    } else if (name.includes('はな') || name.includes('ちゅーりっぷ') || name.includes('ばら') || name.includes('たんぽぽ') || name.includes('ひまわり')) {
      for(let i=0;i<5;i++){ctx.fillStyle=col;const a=i*Math.PI*2/5-Math.PI/2;ctx.beginPath();ctx.arc(cx+Math.cos(a)*r*0.4,cy+Math.sin(a)*r*0.4,r*0.35,0,Math.PI*2);ctx.fill();}
      ctx.fillStyle='#FFEB3B';ctx.beginPath();ctx.arc(cx,cy,r*0.3,0,Math.PI*2);ctx.fill();
    } else if (name.includes('ハート') || name.includes('こころ') || name.includes('たましい')) {
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(cx,cy+r*0.7); ctx.bezierCurveTo(cx-r*1.3,cy-r*0.2,cx-r*0.6,cy-r*1.1,cx,cy-r*0.4);
      ctx.bezierCurveTo(cx+r*0.6,cy-r*1.1,cx+r*1.3,cy-r*0.2,cx,cy+r*0.7); ctx.fill();
    } else if (name.includes('ほのお') || name.includes('たいまつ') || name.includes('ひかり') || name.includes('ランプ') || name.includes('ランタン')) {
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(cx,cy-r); ctx.quadraticCurveTo(cx+r*0.8,cy-r*0.2,cx+r*0.3,cy+r*0.5);
      ctx.quadraticCurveTo(cx,cy+r,cx-r*0.3,cy+r*0.5);
      ctx.quadraticCurveTo(cx-r*0.8,cy-r*0.2,cx,cy-r); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(cx,cy-r*0.2,r*0.2,0,Math.PI*2);ctx.fill();
    } else if (name.includes('たて') || name.includes('シールド')) {
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(cx,cy+r); ctx.lineTo(cx-r*0.8,cy-r*0.2); ctx.lineTo(cx-r*0.8,cy-r);
      ctx.lineTo(cx+r*0.8,cy-r); ctx.lineTo(cx+r*0.8,cy-r*0.2); ctx.closePath(); ctx.fill();
    } else if (name.includes('リボン') || name.includes('マフラー') || name.includes('スカーフ')) {
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.ellipse(cx-r*0.4,cy,r*0.5,r*0.35,-0.3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+r*0.4,cy,r*0.5,r*0.35,0.3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx,cy,r*0.2,0,Math.PI*2); ctx.fill();
    } else if (name.includes('コンパス') || name.includes('ちず') || name.includes('せいざ')) {
      ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx,cy,r*0.7,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle = col; ctx.beginPath(); ctx.moveTo(cx,cy-r*0.6); ctx.lineTo(cx+r*0.15,cy); ctx.lineTo(cx,cy+r*0.15); ctx.lineTo(cx-r*0.15,cy); ctx.closePath(); ctx.fill();
    } else if (name.includes('かいがら') || name.includes('さんご') || name.includes('ひとで')) {
      ctx.fillStyle = col; ctx.beginPath();
      ctx.arc(cx,cy,r*0.7,Math.PI,0); ctx.lineTo(cx+r*0.7,cy+r*0.2);
      ctx.quadraticCurveTo(cx,cy+r*0.5,cx-r*0.7,cy+r*0.2); ctx.closePath(); ctx.fill();
    } else if (name.includes('つき') || name.includes('みかづき')) {
      ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx,cy,r*0.8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFF'; ctx.beginPath(); ctx.arc(cx+r*0.35,cy-r*0.15,r*0.65,0,Math.PI*2); ctx.fill();
    } else if (name.includes('くも') || name.includes('もくもく') || name.includes('わたぐも')) {
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(cx,cy,r*0.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx-r*0.4,cy+r*0.1,r*0.4,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+r*0.4,cy+r*0.1,r*0.4,0,Math.PI*2); ctx.fill();
    } else if (name.includes('ロケット') || name.includes('ふね') || name.includes('ひこうき')) {
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r*0.4,cy+r*0.5); ctx.lineTo(cx-r*0.4,cy+r*0.5); ctx.closePath(); ctx.fill();
      ctx.fillRect(cx-r*0.15,cy+r*0.3,r*0.3,r*0.5);
    } else if (name.includes('バッジ') || name.includes('くんしょう') || name.includes('メダ') || name.includes('しるし') || name.includes('いん')) {
      ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx,cy,r*0.7,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath(); for(let j=0;j<10;j++){const a=(j*36-90)*Math.PI/180;const sr=j%2===0?r*0.5:r*0.25;if(j===0)ctx.moveTo(cx+Math.cos(a)*sr,cy+Math.sin(a)*sr);else ctx.lineTo(cx+Math.cos(a)*sr,cy+Math.sin(a)*sr);}ctx.fill();
    } else if (name.includes('おめめ') || name.includes('め') || name.includes('がん')) {
      ctx.fillStyle = '#FFF'; ctx.beginPath(); ctx.ellipse(cx,cy,r*0.8,r*0.6,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx,cy,r*0.4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(cx,cy,r*0.2,0,Math.PI*2); ctx.fill();
    } else {
      // Generic: colored circle with initial
      ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx,cy,r*0.8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = `bold ${s*0.25}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(name[0], cx, cy);
    }
    return;
  }

  // Legacy fallback for old material IDs
  if (matId === 'footprint') {
    // Paw print
    ctx.fillStyle = '#8D6E63';
    ctx.beginPath(); ctx.ellipse(cx, cy+s*0.1, s*0.25, s*0.3, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx-s*0.2, cy-s*0.25, s*0.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.2, cy-s*0.25, s*0.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx-s*0.08, cy-s*0.35, s*0.08, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.08, cy-s*0.35, s*0.08, 0, Math.PI*2); ctx.fill();
  } else if (matId === 'fur') {
    // Fluffy ball
    ctx.fillStyle = '#F5F5F5';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#E0E0E0'; ctx.lineWidth = 1;
    // Fluff lines
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a)*s*0.15, cy + Math.sin(a)*s*0.15);
      ctx.lineTo(cx + Math.cos(a)*s*0.35, cy + Math.sin(a)*s*0.35);
      ctx.stroke();
    }
  } else if (matId === 'ice') {
    // Crystal
    ctx.fillStyle = '#81D4FA';
    ctx.beginPath();
    ctx.moveTo(cx, cy-s*0.35);
    ctx.lineTo(cx+s*0.25, cy-s*0.1);
    ctx.lineTo(cx+s*0.25, cy+s*0.15);
    ctx.lineTo(cx, cy+s*0.35);
    ctx.lineTo(cx-s*0.25, cy+s*0.15);
    ctx.lineTo(cx-s*0.25, cy-s*0.1);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#4FC3F7'; ctx.lineWidth = 1.5; ctx.stroke();
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.moveTo(cx-s*0.1,cy-s*0.2); ctx.lineTo(cx,cy-s*0.1); ctx.lineTo(cx-s*0.15,cy); ctx.fill();
  } else if (matId === 'star') {
    // Star drop
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = (i * 36 - 90) * Math.PI / 180;
      const r = i % 2 === 0 ? s*0.35 : s*0.15;
      if (i===0) ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
      else ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    }
    ctx.fill();
    ctx.fillStyle = '#81D4FA';
    ctx.beginPath(); ctx.arc(cx, cy+s*0.15, s*0.08, 0, Math.PI*2); ctx.fill();
  } else if (matId === 'shell') {
    // Ice shell
    ctx.fillStyle = '#B2EBF2';
    ctx.beginPath();
    ctx.arc(cx, cy, s*0.3, Math.PI, 0);
    ctx.lineTo(cx+s*0.3, cy+s*0.1);
    ctx.quadraticCurveTo(cx, cy+s*0.25, cx-s*0.3, cy+s*0.1);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#4DD0E1'; ctx.lineWidth = 1.5; ctx.stroke();
    // Ridges
    ctx.strokeStyle = '#80DEEA'; ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(cx, cy+s*0.05, s*(0.12+i*0.07), Math.PI*1.1, Math.PI*1.9);
      ctx.stroke();

  } else {
    // Default: generic sparkle for any material
    ctx.fillStyle = '#90CAF9';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.25, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(cx-s*0.05, cy-s*0.08, s*0.06, 0, Math.PI*2); ctx.fill();
    return;
  } if (matId === 'aurora_UNUSED') {
    // Aurora light
    const colors = ['#E040FB','#7C4DFF','#40C4FF','#69F0AE'];
    for (let i = 0; i < 4; i++) {
      ctx.strokeStyle = colors[i];
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      for (let x = -s*0.35; x <= s*0.35; x += 2) {
        const wavY = Math.sin(x*0.15 + i*0.8) * s*0.12;
        if (x === -s*0.35) ctx.moveTo(cx+x, cy + i*5 - 8 + wavY);
        else ctx.lineTo(cx+x, cy + i*5 - 8 + wavY);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

function drawCardBear(cx, cy, size, recipeId) {
  const img = CARD_IMG_CACHE[recipeId];
  if (img && img.complete) {
    ctx.drawImage(img, cx - size/2, cy - size/2, size, size);
  } else {
    drawBear(cx, cy, size * 0.4, true);
  }
}

function drawCard(x, y, w, h, emoji, name, borderColor, glow = false, matId = null) {
  if (glow) {
    ctx.shadowColor = borderColor;
    ctx.shadowBlur = 15;
  }
  // Card bg
  ctx.fillStyle = '#FFFFFF';
  drawRoundRect(x, y, w, h, 8);
  ctx.fill();
  // Border
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.shadowBlur = 0;
  // Icon
  if (matId) {
    drawMaterialIcon(x + w/2, y + h*0.38, matId, h * 0.3);
  } else if (emoji) {
    ctx.font = `${h * 0.35}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, x + w / 2, y + h * 0.38);
  }
  // Name
  ctx.fillStyle = '#333';
  ctx.font = `bold ${Math.min(h * 0.13, 14)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(name, x + w / 2, y + h * 0.75);
}

// ============================================================
// 9. Scene State Machine
// ============================================================
let scene = 'title';
let sceneTimer = 0;

// ============================================================
// 10. Title Scene
// ============================================================
let titleBearBob = 0;
let showSettings = false;

function updateTitle() {
  titleBearBob += 0.05;

  if (inputTapped) {
    initAudio();

    if (showSettings) {
      // Setting buttons
      const modes = ['numbers', 'letters', 'mixed'];
      const labels = ['すうじだけ', 'もじだけ', 'まぜる'];
      for (let i = 0; i < 3; i++) {
        const bx = 60, by = 320 + i * 65, bw = 280, bh = 50;
        if (hitRect(inputX, inputY, bx, by, bw, bh)) {
          sfxButton();
          saveData.settings.questionMode = modes[i];
          saveGame();
        }
      }
      // Reset data button
      if (hitRect(inputX, inputY, 60, 520, 280, 50)) {
        sfxButton();
        const prevSettings = { ...saveData.settings };
        saveData = defaultSave();
        saveData.settings = prevSettings;
        saveGame();
        showSettings = false;
      }
      // Back button
      if (hitRect(inputX, inputY, 120, 590, 160, 50)) {
        sfxButton();
        showSettings = false;
      }
    } else {
      const hasSave = saveData.clearedStages.length > 0;
      // Main button (はじめる or つづきから)
      if (hitRect(inputX, inputY, 80, 400, 240, 55)) {
        sfxButton();
        if (!hasSave) {
          // First time: initialize
          saveGame();
        }
        scene = 'stageSelect';
        // Auto-navigate to current world
        const maxCleared = saveData.clearedStages.length > 0 ? Math.max(...saveData.clearedStages) : 0;
        currentWorld = Math.floor(maxCleared / STAGES_PER_WORLD);
        stageScrollY = 0; stageScrollTarget = 0;
      }
      // ずかん
      if (hitRect(inputX, inputY, 80, 475, 240, 55)) {
        sfxButton();
        albumFrom = 'title';
        scene = 'album';
      }
      // Sound toggle
      if (hitRect(inputX, inputY, 340, 20, 50, 50)) {
        soundEnabled = !soundEnabled;
        saveGame();
        if (soundEnabled) sfxButton();
      }
      // Settings gear
      if (hitRect(inputX, inputY, 280, 20, 50, 50)) {
        sfxButton();
        showSettings = true;
      }
    }
  }
}

let stageScrollY = 0;
let stageScrollTarget = 0;
let stageDragStartY = -1;
let stageDragLastY = -1;

// Pointer events for scrolling
canvas.addEventListener('pointermove', e => {
  if (scene === 'stageSelect' && stageDragStartY >= 0) {
    const p = toGameCoords(e.clientX, e.clientY);

});

// World definitions (30 stages each)
const WORLDS = [
  { name: 'そうげん', emoji: '🌿', bg1: '#E8F5E9', bg2: '#C8E6C9', text: '#2E7D32' },
  { name: 'うみべ',   emoji: '🏖️', bg1: '#E3F2FD', bg2: '#BBDEFB', text: '#1565C0' },
  { name: 'やま',     emoji: '⛰️', bg1: '#EFEBE9', bg2: '#D7CCC8', text: '#4E342E' },
  { name: 'さばく',   emoji: '🏜️', bg1: '#FFF8E1', bg2: '#FFECB3', text: '#FF8F00' },
  { name: 'ゆきやま', emoji: '❄️', bg1: '#ECEFF1', bg2: '#CFD8DC', text: '#37474F' },
  { name: 'かざん',   emoji: '🌋', bg1: '#FBE9E7', bg2: '#FFCCBC', text: '#BF360C' },
  { name: 'ほしぞら', emoji: '🌌', bg1: '#EDE7F6', bg2: '#D1C4E9', text: '#4527A0' },
];
let currentWorld = 0;
const STAGES_PER_WORLD = 30;

function getWorldForStage(stageId) { return Math.floor((stageId - 1) / STAGES_PER_WORLD); }
function getMaxUnlockedWorld() {
  const maxCleared = saveData.clearedStages.length > 0 ? Math.max(...saveData.clearedStages) : 0;
  return Math.floor(maxCleared / STAGES_PER_WORLD);
}

function updateStageSelect() {
  stageScrollY += (stageScrollTarget - stageScrollY) * 0.2;
  const worldStages = STAGES.filter(s => getWorldForStage(s.id) === currentWorld);
  const rows = Math.ceil(worldStages.length / 3);
  const maxScroll = Math.max(0, rows * 95 + 60 - 480);
  stageScrollTarget = Math.max(0, Math.min(maxScroll, stageScrollTarget));
  stageScrollY = Math.max(0, Math.min(maxScroll, stageScrollY));

  if (inputTapped) {
    const dragDist = stageDragStartY >= 0 ? Math.abs(inputY - stageDragStartY) : 0;
    if (dragDist < 10) {
      // World nav arrows
      if (hitRect(inputX, inputY, 10, 30, 50, 40) && currentWorld > 0) {
        sfxButton(); currentWorld--; stageScrollY = 0; stageScrollTarget = 0;
      }
      const maxWorld = getMaxUnlockedWorld();
      if (hitRect(inputX, inputY, DESIGN_W - 60, 30, 50, 40) && currentWorld < Math.min(maxWorld, WORLDS.length - 1)) {
        sfxButton(); currentWorld++; stageScrollY = 0; stageScrollTarget = 0;
      }

      // Stage buttons
      for (let li = 0; li < worldStages.length; li++) {
        const stage = worldStages[li];
        const col = li % 3;
        const row = Math.floor(li / 3);
        const cx = 35 + col * 125 + 40;
        const cy = 120 + row * 95 + 38 - stageScrollY;
        if (cy < 80 || cy > 620) continue;
        if (hitCircle(inputX, inputY, cx, cy, 35)) {
          const globalIdx = stage.id - 1;
          if (globalIdx === 0 || saveData.clearedStages.includes(globalIdx)) {
            sfxButton();
            startStage(stage);
          }
        }
      }
      if (hitRect(inputX, inputY, 20, 645, 120, 42)) { sfxButton(); scene = 'title'; }
    }
  }
}

function drawStageSelect() {
  const world = WORLDS[Math.min(currentWorld, WORLDS.length - 1)];
  const grad = ctx.createLinearGradient(0, 0, 0, DESIGN_H);
  grad.addColorStop(0, world.bg1); grad.addColorStop(1, world.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

  // World title
  ctx.fillStyle = world.text;
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`ワールド ${currentWorld + 1}`, DESIGN_W / 2, 35);
  ctx.font = 'bold 18px sans-serif';
  ctx.fillText(world.name, DESIGN_W / 2, 58);

  // World nav arrows
  if (currentWorld > 0) {
    ctx.fillStyle = world.text; ctx.font = 'bold 30px sans-serif';
    ctx.textAlign = 'center'; ctx.fillText('◀', 35, 48);
  }
  const maxWorld = getMaxUnlockedWorld();
  if (currentWorld < Math.min(maxWorld, WORLDS.length - 1)) {
    ctx.fillStyle = world.text; ctx.font = 'bold 30px sans-serif';
    ctx.textAlign = 'center'; ctx.fillText('▶', DESIGN_W - 35, 48);
    // If current world is fully cleared, show "next world" guide
    const thisWorldCleared = saveData.clearedStages.filter(
      s => s >= currentWorld * STAGES_PER_WORLD + 1 && s <= (currentWorld + 1) * STAGES_PER_WORLD
    ).length >= STAGES_PER_WORLD;
    if (thisWorldCleared) {
      const nextW = WORLDS[Math.min(currentWorld + 1, WORLDS.length - 1)];
      const pulse = Math.sin(sceneTimer * 0.08) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#FF5722'; ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`▶ ${nextW.name} へ！`, DESIGN_W - 60, 70);
      ctx.globalAlpha = 1;
    }
  }

  // Progress for this world
  const worldStart = currentWorld * STAGES_PER_WORLD + 1;
  const worldEnd = Math.min((currentWorld + 1) * STAGES_PER_WORLD, STAGES.length);
  const worldCleared = saveData.clearedStages.filter(s => s >= worldStart && s <= worldEnd).length;
  const worldTotal = worldEnd - worldStart + 1;
  ctx.fillStyle = world.text; ctx.globalAlpha = 0.6;
  ctx.font = '13px sans-serif';
  ctx.fillText(`${worldCleared} / ${worldTotal} クリア`, DESIGN_W / 2, 78);
  ctx.globalAlpha = 1;

  // Stages
  ctx.save();
  ctx.beginPath(); ctx.rect(0, 90, DESIGN_W, 545); ctx.clip();

  const worldStages = STAGES.filter(s => getWorldForStage(s.id) === currentWorld);
  for (let li = 0; li < worldStages.length; li++) {
    const stage = worldStages[li];
    const col = li % 3;
    const row = Math.floor(li / 3);
    const cx = 35 + col * 125 + 40;
    const cy = 120 + row * 95 + 38 - stageScrollY;
    const r = 35;
    if (cy < 50 || cy > 680) continue;

    const isCleared = saveData.clearedStages.includes(stage.id);
    const globalIdx = stage.id - 1;
    const locked = globalIdx > 0 && !saveData.clearedStages.includes(globalIdx);

    // Circle color
    ctx.fillStyle = isCleared ? '#81C784' : (locked ? 'rgba(0,0,0,0.12)' : world.text);
    ctx.globalAlpha = locked ? 0.5 : 1;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2; ctx.stroke();

    // Always show stage number
    ctx.fillStyle = locked ? 'rgba(0,0,0,0.3)' : '#FFF';
    ctx.font = `bold ${locked ? 16 : 20}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(stage.id), cx, cy);

    // Lock icon (small, below number)
    if (locked) {
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillRect(cx - 5, cy + 12, 10, 7);
      ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx, cy + 10, 5, Math.PI, 0); ctx.stroke();
    }

    // Star for cleared
    if (isCleared) {
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      for (let j = 0; j < 10; j++) {
        const a = (j * 36 - 90) * Math.PI / 180;
        const sr = j % 2 === 0 ? 7 : 3;
        if (j===0) ctx.moveTo(cx+Math.cos(a)*sr, cy-r-6+Math.sin(a)*sr);
        else ctx.lineTo(cx+Math.cos(a)*sr, cy-r-6+Math.sin(a)*sr);
      }
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  drawButton(20, 645, 120, 42, 'もどる', '#78909C', '#FFF', 16);
}

// 12. Main Game (Otasuke) Scene
