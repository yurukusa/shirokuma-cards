<style>

  width: 100%; height: 100%;
  overflow: hidden;
  background: #e8f4f8;

<canvas id="game"></canvas>
<script>
'use strict';

// ============================================================
// 1. Canvas & Core Setup
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Design dimensions (portrait)
const DESIGN_W = 400;
const DESIGN_H = 700;
let scale = 1;
let offsetX = 0, offsetY = 0;

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const ratio = DESIGN_W / DESIGN_H;
  if (w / h < ratio) {
    canvas.width = w;
    canvas.height = w / ratio;
  } else {
    canvas.height = h;
    canvas.width = h * ratio;
  }
  scale = canvas.width / DESIGN_W;
  offsetX = (w - canvas.width) / 2;
  offsetY = (h - canvas.height) / 2;
  canvas.style.marginTop = offsetY + 'px';
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// 2. Input
// ============================================================
let inputX = -1, inputY = -1, inputTapped = false;

function toGameCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) / scale,
    y: (clientY - rect.top) / scale
  };
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  const p = toGameCoords(e.clientX, e.clientY);
  inputX = p.x; inputY = p.y; inputTapped = true;
});

function hitRect(x, y, rx, ry, rw, rh) {
  return x >= rx && x <= rx + rw && y >= ry && y <= ry + rh;
}

function hitCircle(x, y, cx, cy, r) {
  return (x - cx) ** 2 + (y - cy) ** 2 <= r * r;
}

// ============================================================
// 3. Audio (Web Audio API - procedural)
// ============================================================
let audioCtx = null;
let soundEnabled = true;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, dur, type = 'sine', vol = 0.3) {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function sfxCorrect() { playTone(523, 0.15, 'triangle'); setTimeout(() => playTone(659, 0.15, 'triangle'), 100); setTimeout(() => playTone(784, 0.2, 'triangle'), 200); }
function sfxWrong() { playTone(200, 0.3, 'square', 0.15); }
function sfxLaunch() { playTone(300, 0.1, 'sawtooth', 0.2); setTimeout(() => playTone(600, 0.3, 'sawtooth', 0.15), 50); }
function sfxHit() { playTone(150, 0.2, 'square', 0.2); playTone(100, 0.3, 'square', 0.15); }
function sfxBreak() { for (let i = 0; i < 5; i++) setTimeout(() => playTone(80 + Math.random() * 200, 0.2, 'square', 0.15), i * 60); }
function sfxRescue() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.3, 'triangle', 0.25), i * 150)); }
function sfxSynth() { [784, 988, 1175, 1319, 1568].forEach((f, i) => setTimeout(() => playTone(f, 0.4, 'sine', 0.2), i * 120)); }
function sfxCardGet() { playTone(660, 0.15, 'triangle'); setTimeout(() => playTone(880, 0.25, 'triangle'), 120); }
function sfxButton() { playTone(440, 0.08, 'triangle', 0.15); }

// ============================================================
// 4. Save/Load
// ============================================================
const SAVE_KEY = 'shirokuma_cards_v1';

const defaultSave = () => ({
  version: 1,
  clearedStages: [],
  materials: { footprint: 0, fur: 0, ice: 0, star: 0, shell: 0, aurora: 0 },
  completedCards: { koguma: 0, osanpo: 0, hoshizora: 0, oyasumi: 0, ousama: 0, ouji: 0, densetsu: 0 },
  settings: { questionMode: 'mixed', sound: true },
  stats: { totalQuestions: 0, totalCorrect: 0 }
});

let saveData = defaultSave();

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d.version === 1) {
        saveData = d;
        // Migrate: add new material/card keys if missing
        for (const m of MATERIALS) { if (!(m.id in saveData.materials)) saveData.materials[m.id] = 0; }
        for (const r of RECIPES) { if (!(r.id in saveData.completedCards)) saveData.completedCards[r.id] = 0; }
        soundEnabled = d.settings.sound;
      }
    }
  } catch (e) { /* ignore */ }
}

function saveGame() {
  saveData.settings.sound = soundEnabled;
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(saveData)); } catch (e) { /* ignore */ }
}

loadGame();

// 100 Stages - rockets stay modest, difficulty comes from question types
const STAGES = [];
for (let i = 1; i <= 100; i++) {
  let level, drops;
  if (i <= 10) { level = 1; drops = 1; }
  else if (i <= 20) { level = 2; drops = 2; }
  else if (i <= 40) { level = 3; drops = 2; }
  else if (i <= 60) { level = 3; drops = 3; }
  else if (i <= 80) { level = 3; drops = 3; }
  else { level = 3; drops = 4; }
  // Rockets grow slowly: 3-8 max
  const rockets = Math.min(8, 3 + Math.floor(i / 15));
  const iceHP = rockets * 10;
  STAGES.push({ id: i, iceHP, rockets, level, drops });
}

// ============================================================
// 6. Particle System
// ============================================================
const particles = [];
const MAX_PARTICLES = 200;

function addParticle(x, y, type, color, vx, vy, life) {
  if (particles.length >= MAX_PARTICLES) return;
  particles.push({ x, y, type, color, vx, vy, life, maxLife: life, size: 3 + Math.random() * 4 });
}

function spawnIceShards(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    addParticle(x, y, 'shard', `hsl(${195 + Math.random()*20}, 80%, ${70+Math.random()*20}%)`,
      Math.cos(angle) * speed, Math.sin(angle) * speed - 2, 40 + Math.random() * 30);
  }
}

function spawnSparkles(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    const colors = ['#FFD700', '#FFF176', '#FFFFFF', '#FF80AB'];
    addParticle(x, y, 'sparkle', colors[Math.floor(Math.random() * colors.length)],
      Math.cos(angle) * speed, Math.sin(angle) * speed - 1, 50 + Math.random() * 40);
  }
}

function spawnHearts(x, y, count) {
  for (let i = 0; i < count; i++) {
    addParticle(x + (Math.random() - 0.5) * 60, y, 'heart', '#FF80AB',
      (Math.random() - 0.5) * 2, -1 - Math.random() * 2, 60 + Math.random() * 30);
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05; // gravity
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    if (p.type === 'sparkle') {
      ctx.fillStyle = p.color;
      const s = p.size * (1 + (1 - alpha) * 0.5);
      // star shape
      ctx.beginPath();
      for (let j = 0; j < 5; j++) {
        const a = (j * 72 - 90) * Math.PI / 180;
        const r = j % 2 === 0 ? s : s * 0.4;
        if (j === 0) ctx.moveTo(p.x + Math.cos(a) * r, p.y + Math.sin(a) * r);
        else ctx.lineTo(p.x + Math.cos(a) * r, p.y + Math.sin(a) * r);
      }
      ctx.fill();
    } else if (p.type === 'heart') {
      ctx.font = `${p.size * 3}px sans-serif`;
      ctx.fillText('💕', p.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// 7. Screen Shake
// ============================================================
let shakeIntensity = 0;
let shakeDuration = 0;

function triggerShake(intensity, duration) {
  shakeIntensity = intensity;
  shakeDuration = duration;
}

function applyShake() {
  if (shakeDuration > 0) {
    const dx = (Math.random() - 0.5) * shakeIntensity * 2;
    const dy = (Math.random() - 0.5) * shakeIntensity * 2;
    ctx.translate(dx, dy);
    shakeDuration--;
    if (shakeDuration <= 0) shakeIntensity = 0;
  }
}

function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.closePath();
}

function drawButton(x, y, w, h, text, color = '#4FC3F7', textColor = '#FFF', fontSize = 24) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  drawRoundRect(x + 2, y + 2, w, h, 12);
  ctx.fill();
  // Button
  ctx.fillStyle = color;
  drawRoundRect(x, y, w, h, 12);
  ctx.fill();
  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Text
  ctx.fillStyle = textColor;
  ctx.font = `bold ${fontSize}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x + w / 2, y + h / 2);
}

function drawBear(x, y, size, happy = false) {
  const s = size;
  // Body
  ctx.fillStyle = '#FAFAFA';
  ctx.beginPath();
  ctx.ellipse(x, y + s * 0.3, s * 0.5, s * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#DDD';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Head
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(x, y - s * 0.3, s * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // Ears
  ctx.fillStyle = '#F5F5F5';
  ctx.beginPath();
  ctx.arc(x - s * 0.28, y - s * 0.6, s * 0.14, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x + s * 0.28, y - s * 0.6, s * 0.14, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // Inner ears
  ctx.fillStyle = '#FFCDD2';
  ctx.beginPath();
  ctx.arc(x - s * 0.28, y - s * 0.6, s * 0.07, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + s * 0.28, y - s * 0.6, s * 0.07, 0, Math.PI * 2);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#333';
  if (happy) {
    // Happy eyes (arcs)
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#333';
    ctx.beginPath();
    ctx.arc(x - s * 0.12, y - s * 0.35, s * 0.06, 0, Math.PI, true);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x + s * 0.12, y - s * 0.35, s * 0.06, 0, Math.PI, true);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(x - s * 0.12, y - s * 0.35, s * 0.05, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + s * 0.12, y - s * 0.35, s * 0.05, 0, Math.PI * 2);
    ctx.fill();
    // Eye shine
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(x - s * 0.1, y - s * 0.37, s * 0.02, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + s * 0.14, y - s * 0.37, s * 0.02, 0, Math.PI * 2);
    ctx.fill();
  }
  // Nose
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.ellipse(x, y - s * 0.22, s * 0.06, s * 0.04, 0, 0, Math.PI * 2);
  ctx.fill();
  // Mouth
  if (happy) {
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y - s * 0.18, s * 0.08, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();
  }
  // Arms
  ctx.fillStyle = '#FAFAFA';
  ctx.beginPath();
  ctx.ellipse(x - s * 0.45, y + s * 0.15, s * 0.12, s * 0.25, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#DDD';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + s * 0.45, y + s * 0.15, s * 0.12, s * 0.25, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
}

function drawIceBlock(x, y, w, h, hpRatio, crackLevel) {
  // Main ice
  ctx.fillStyle = `rgba(180, 225, 255, ${0.5 + hpRatio * 0.3})`;
  ctx.strokeStyle = 'rgba(100, 180, 220, 0.6)';
  ctx.lineWidth = 2;
  drawRoundRect(x, y, w, h, 8);
  ctx.fill();
  ctx.stroke();

  // Inner glow
  const grad = ctx.createRadialGradient(x + w/2, y + h/2, 0, x + w/2, y + h/2, w * 0.6);
  grad.addColorStop(0, 'rgba(255,255,255,0.3)');
  grad.addColorStop(1, 'rgba(180,225,255,0)');
  ctx.fillStyle = grad;
  drawRoundRect(x, y, w, h, 8);
  ctx.fill();

  // Cracks based on damage
  if (crackLevel > 0) {
    ctx.strokeStyle = 'rgba(60, 140, 180, 0.5)';
    ctx.lineWidth = 1.5;
    const cx = x + w / 2, cy = y + h / 2;
    const cracks = Math.min(crackLevel, 8);
    const seed = 42; // consistent cracks
    for (let i = 0; i < cracks; i++) {
      ctx.beginPath();
      const angle = (i / cracks) * Math.PI * 2 + (seed * i % 1);
      let px = cx, py = cy;
      ctx.moveTo(px, py);
      const segments = 2 + Math.floor(crackLevel / 2);
      for (let j = 0; j < segments; j++) {
        const dist = (j + 1) * (Math.min(w, h) * 0.15);
        px = cx + Math.cos(angle + (j * 0.3 - 0.15)) * dist;
        py = cy + Math.sin(angle + (j * 0.3 - 0.15)) * dist;
        // Clamp to ice bounds
        px = Math.max(x + 4, Math.min(x + w - 4, px));
        py = Math.max(y + 4, Math.min(y + h - 4, py));
        ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
  }
}

function drawRocket(x, y, size, angle = -Math.PI / 2) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle + Math.PI / 2);
  const s = size;
  // Body
  ctx.fillStyle = '#FF5722';
  ctx.beginPath();
  ctx.moveTo(0, -s);
  ctx.lineTo(-s * 0.3, s * 0.3);
  ctx.lineTo(s * 0.3, s * 0.3);
  ctx.closePath();
  ctx.fill();
  // Nose
  ctx.fillStyle = '#FFEB3B';
  ctx.beginPath();
  ctx.arc(0, -s * 0.4, s * 0.2, 0, Math.PI * 2);
  ctx.fill();
  // Window
  ctx.fillStyle = '#81D4FA';
  ctx.beginPath();
  ctx.arc(0, -s * 0.2, s * 0.1, 0, Math.PI * 2);
  ctx.fill();
  // Fins
  ctx.fillStyle = '#FF7043';
  ctx.beginPath();
  ctx.moveTo(-s * 0.3, s * 0.2);
  ctx.lineTo(-s * 0.5, s * 0.5);
  ctx.lineTo(-s * 0.15, s * 0.3);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(s * 0.3, s * 0.2);
  ctx.lineTo(s * 0.5, s * 0.5);
  ctx.lineTo(s * 0.15, s * 0.3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawWordPicture(cx, cy, type, size) {
  const img = QUIZ_IMG_CACHE[type];
  if (img && img.complete) {
    ctx.drawImage(img, cx - size/2, cy - size/2, size, size);
    return;
  }
  // Fallback: draw simple colored circle with first letter
  ctx.fillStyle = '#DDD';
  ctx.beginPath(); ctx.arc(cx, cy, size*0.4, 0, Math.PI*2); ctx.fill();
  return;
  // Legacy canvas drawing below (kept but unreachable)
  const s = size;
  ctx.save();
  if (type === 'bear') {
    drawBear(cx, cy, s * 0.7, true);
  } else if (type === 'sea') {
    // waves
    ctx.strokeStyle = '#1E88E5';
    ctx.lineWidth = 3;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      for (let x = -s; x <= s; x += 2) {
        ctx.lineTo(cx + x, cy + i * 12 - 10 + Math.sin(x * 0.1) * 6);
      }
      ctx.stroke();
    }
  } else if (type === 'dog') {
    ctx.fillStyle = '#8D6E63';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.35, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#5D4037';
    ctx.beginPath(); ctx.ellipse(cx-s*0.25, cy-s*0.3, s*0.15, s*0.2, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+s*0.25, cy-s*0.3, s*0.15, s*0.2, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx-s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy+s*0.08, 4, 0, Math.PI*2); ctx.fill();
  } else if (type === 'rain') {
    ctx.fillStyle = '#90CAF9';
    for (let i = 0; i < 6; i++) {
      const rx = cx + (i%3-1)*15, ry = cy + (Math.floor(i/3))*18 - 10;
      ctx.beginPath(); ctx.ellipse(rx, ry, 3, 7, 0, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#78909C';
    ctx.beginPath();
    ctx.ellipse(cx, cy-s*0.3, s*0.4, s*0.2, 0, 0, Math.PI*2);
    ctx.fill();
  } else if (type === 'oni') {
    ctx.fillStyle = '#EF5350';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(cx-s*0.1, cy-s*0.05, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.1, cy-s*0.05, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFEB3B';
    ctx.beginPath(); ctx.moveTo(cx-s*0.12, cy-s*0.3); ctx.lineTo(cx-s*0.08, cy-s*0.5); ctx.lineTo(cx-s*0.04, cy-s*0.3); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+s*0.04, cy-s*0.3); ctx.lineTo(cx+s*0.08, cy-s*0.5); ctx.lineTo(cx+s*0.12, cy-s*0.3); ctx.fill();
  } else if (type === 'station') {
    ctx.fillStyle = '#78909C';
    ctx.fillRect(cx-s*0.3, cy-s*0.2, s*0.6, s*0.4);
    ctx.fillStyle = '#B0BEC5';
    ctx.fillRect(cx-s*0.35, cy-s*0.25, s*0.7, s*0.08);
    ctx.fillStyle = '#FFF';
    ctx.fillRect(cx-s*0.15, cy-s*0.1, s*0.12, s*0.15);
    ctx.fillRect(cx+s*0.05, cy-s*0.1, s*0.12, s*0.15);
  } else if (type === 'crab') {
    ctx.fillStyle = '#EF5350';
    ctx.beginPath(); ctx.ellipse(cx, cy, s*0.3, s*0.2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx-s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#EF5350'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx-s*0.3,cy); ctx.lineTo(cx-s*0.5,cy-s*0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+s*0.3,cy); ctx.lineTo(cx+s*0.5,cy-s*0.2); ctx.stroke();
  } else if (type === 'fox') {
    ctx.fillStyle = '#FF8F00';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(cx, cy+s*0.1, s*0.15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx-s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    // ears
    ctx.fillStyle = '#FF8F00';
    ctx.beginPath(); ctx.moveTo(cx-s*0.2,cy-s*0.25); ctx.lineTo(cx-s*0.35,cy-s*0.5); ctx.lineTo(cx-s*0.05,cy-s*0.25); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+s*0.2,cy-s*0.25); ctx.lineTo(cx+s*0.35,cy-s*0.5); ctx.lineTo(cx+s*0.05,cy-s*0.25); ctx.fill();
  } else if (type === 'fish') {
    ctx.fillStyle = '#42A5F5';
    ctx.beginPath(); ctx.ellipse(cx, cy, s*0.35, s*0.18, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+s*0.3,cy); ctx.lineTo(cx+s*0.5,cy-s*0.15); ctx.lineTo(cx+s*0.5,cy+s*0.15); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(cx-s*0.15, cy-s*0.03, 3, 0, Math.PI*2); ctx.fill();
  } else if (type === 'deer') {
    ctx.fillStyle = '#8D6E63';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx-s*0.1, cy, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.1, cy, 3, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#5D4037'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx-s*0.1,cy-s*0.3); ctx.lineTo(cx-s*0.15,cy-s*0.5); ctx.lineTo(cx-s*0.25,cy-s*0.55); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+s*0.1,cy-s*0.3); ctx.lineTo(cx+s*0.15,cy-s*0.5); ctx.lineTo(cx+s*0.25,cy-s*0.55); ctx.stroke();
  } else if (type === 'ice') {
    ctx.fillStyle = 'rgba(180,225,255,0.7)';
    drawRoundRect(cx-s*0.25, cy-s*0.3, s*0.5, s*0.6, 4);
    ctx.fill();
    ctx.strokeStyle = 'rgba(100,180,220,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
  } else if (type === 'cake') {
    ctx.fillStyle = '#FFCCBC';
    ctx.fillRect(cx-s*0.25, cy-s*0.1, s*0.5, s*0.3);
    ctx.fillStyle = '#FFF';
    ctx.fillRect(cx-s*0.25, cy-s*0.15, s*0.5, s*0.08);
    ctx.fillStyle = '#EF5350';
    ctx.beginPath(); ctx.arc(cx, cy-s*0.2, s*0.05, 0, Math.PI*2); ctx.fill();
  } else if (type === 'watermelon') {
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#E53935';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.25, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    for (let i = 0; i < 5; i++) { ctx.beginPath(); ctx.arc(cx+(i-2)*6, cy, 2, 0, Math.PI*2); ctx.fill(); }
  } else if (type === 'octopus') {
    ctx.fillStyle = '#E91E63';
    ctx.beginPath(); ctx.arc(cx, cy-s*0.1, s*0.25, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(cx-s*0.08, cy-s*0.15, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.08, cy-s*0.15, 4, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#E91E63'; ctx.lineWidth = 3;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      const ox = cx + (i-1.5)*10;
      ctx.moveTo(ox, cy+s*0.1); ctx.quadraticCurveTo(ox+5, cy+s*0.3, ox-3, cy+s*0.35);
      ctx.stroke();
    }
  } else if (type === 'moon') {
    ctx.fillStyle = '#FFEB3B';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#E3F2FD';
    ctx.beginPath(); ctx.arc(cx+s*0.12, cy-s*0.05, s*0.25, 0, Math.PI*2); ctx.fill();
  } else if (type === 'cat') {
    ctx.fillStyle = '#FFB74D';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx-s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.1, cy-s*0.05, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFB74D';
    ctx.beginPath(); ctx.moveTo(cx-s*0.2,cy-s*0.25); ctx.lineTo(cx-s*0.3,cy-s*0.5); ctx.lineTo(cx-s*0.05,cy-s*0.28); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+s*0.2,cy-s*0.25); ctx.lineTo(cx+s*0.3,cy-s*0.5); ctx.lineTo(cx+s*0.05,cy-s*0.28); ctx.fill();
    // whiskers
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx-s*0.15,cy+s*0.05); ctx.lineTo(cx-s*0.4,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+s*0.15,cy+s*0.05); ctx.lineTo(cx+s*0.4,cy); ctx.stroke();
  } else if (type === 'flower') {
    const petals = ['#FF80AB','#FF4081','#F48FB1','#FF80AB','#FF4081'];
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = petals[i];
      const a = i * Math.PI * 2 / 5 - Math.PI/2;
      ctx.beginPath(); ctx.arc(cx+Math.cos(a)*s*0.15, cy+Math.sin(a)*s*0.15, s*0.12, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#FFEB3B';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.1, 0, Math.PI*2); ctx.fill();
  } else if (type === 'star') {
    ctx.fillStyle = '#FFEB3B';
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = (i * 36 - 90) * Math.PI / 180;
      const r = i % 2 === 0 ? s*0.35 : s*0.15;
      if (i===0) ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
      else ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    }
    ctx.fill();
  }
  ctx.restore();
}

function drawMaterialIcon(cx, cy, matId, size) {
  const s = size;
  if (matId === 'footprint') {
    // Paw print
    ctx.fillStyle = '#8D6E63';
    ctx.beginPath(); ctx.ellipse(cx, cy+s*0.1, s*0.25, s*0.3, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx-s*0.2, cy-s*0.25, s*0.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.2, cy-s*0.25, s*0.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx-s*0.08, cy-s*0.35, s*0.08, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.08, cy-s*0.35, s*0.08, 0, Math.PI*2); ctx.fill();
  } else if (matId === 'fur') {
    // Fluffy ball
    ctx.fillStyle = '#F5F5F5';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#E0E0E0'; ctx.lineWidth = 1;
    // Fluff lines
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a)*s*0.15, cy + Math.sin(a)*s*0.15);
      ctx.lineTo(cx + Math.cos(a)*s*0.35, cy + Math.sin(a)*s*0.35);
      ctx.stroke();
    }
  } else if (matId === 'ice') {
    // Crystal
    ctx.fillStyle = '#81D4FA';
    ctx.beginPath();
    ctx.moveTo(cx, cy-s*0.35);
    ctx.lineTo(cx+s*0.25, cy-s*0.1);
    ctx.lineTo(cx+s*0.25, cy+s*0.15);
    ctx.lineTo(cx, cy+s*0.35);
    ctx.lineTo(cx-s*0.25, cy+s*0.15);
    ctx.lineTo(cx-s*0.25, cy-s*0.1);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#4FC3F7'; ctx.lineWidth = 1.5; ctx.stroke();
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.moveTo(cx-s*0.1,cy-s*0.2); ctx.lineTo(cx,cy-s*0.1); ctx.lineTo(cx-s*0.15,cy); ctx.fill();
  } else if (matId === 'star') {
    // Star drop
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = (i * 36 - 90) * Math.PI / 180;
      const r = i % 2 === 0 ? s*0.35 : s*0.15;
      if (i===0) ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
      else ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    }
    ctx.fill();
    ctx.fillStyle = '#81D4FA';
    ctx.beginPath(); ctx.arc(cx, cy+s*0.15, s*0.08, 0, Math.PI*2); ctx.fill();
  } else if (matId === 'shell') {
    // Ice shell
    ctx.fillStyle = '#B2EBF2';
    ctx.beginPath();
    ctx.arc(cx, cy, s*0.3, Math.PI, 0);
    ctx.lineTo(cx+s*0.3, cy+s*0.1);
    ctx.quadraticCurveTo(cx, cy+s*0.25, cx-s*0.3, cy+s*0.1);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#4DD0E1'; ctx.lineWidth = 1.5; ctx.stroke();
    // Ridges
    ctx.strokeStyle = '#80DEEA'; ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(cx, cy+s*0.05, s*(0.12+i*0.07), Math.PI*1.1, Math.PI*1.9);
      ctx.stroke();
    }
  } else if (matId === 'aurora') {
    // Aurora light
    const colors = ['#E040FB','#7C4DFF','#40C4FF','#69F0AE'];
    for (let i = 0; i < 4; i++) {
      ctx.strokeStyle = colors[i];
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      for (let x = -s*0.35; x <= s*0.35; x += 2) {
        const wavY = Math.sin(x*0.15 + i*0.8) * s*0.12;
        if (x === -s*0.35) ctx.moveTo(cx+x, cy + i*5 - 8 + wavY);
        else ctx.lineTo(cx+x, cy + i*5 - 8 + wavY);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

function drawCardBear(cx, cy, size, recipeId) {
  const img = CARD_IMG_CACHE[recipeId];
  if (img && img.complete) {
    ctx.drawImage(img, cx - size/2, cy - size/2, size, size);
  } else {
    drawBear(cx, cy, size * 0.4, true);
  }
}

function drawCard(x, y, w, h, emoji, name, borderColor, glow = false, matId = null) {
  if (glow) {
    ctx.shadowColor = borderColor;
    ctx.shadowBlur = 15;
  }
  // Card bg
  ctx.fillStyle = '#FFFFFF';
  drawRoundRect(x, y, w, h, 8);
  ctx.fill();
  // Border
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.shadowBlur = 0;
  // Icon
  if (matId) {
    drawMaterialIcon(x + w/2, y + h*0.38, matId, h * 0.3);
  } else if (emoji) {
    ctx.font = `${h * 0.35}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, x + w / 2, y + h * 0.38);
  }
  // Name
  ctx.fillStyle = '#333';
  ctx.font = `bold ${Math.min(h * 0.13, 14)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(name, x + w / 2, y + h * 0.75);
}

function drawTitle() {

    }
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';

    ctx.font = 'bold 32px sans-serif';

    ctx.fillStyle = '#FFF'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(soundEnabled ? 'ON' : 'OFF', 365, 47);

    // Settings gear (drawn)

// 11. Stage Select Scene (scrollable)
// ============================================================
let stageScrollY = 0;
let stageScrollTarget = 0;
let stageDragStartY = -1;
let stageDragLastY = -1;

// Pointer events for scrolling
canvas.addEventListener('pointermove', e => {
  if (scene === 'stageSelect' && stageDragStartY >= 0) {
    const p = toGameCoords(e.clientX, e.clientY);
    const dy = p.y - stageDragLastY;
    stageScrollTarget -= dy;
    stageDragLastY = p.y;
  }
  if (scene === 'album' && albumDragStartY >= 0) {
    const p = toGameCoords(e.clientX, e.clientY);
    const dy = p.y - albumDragLastY;
    albumScrollTarget -= dy;
    albumDragLastY = p.y;
  }
});
canvas.addEventListener('pointerdown', e => {
  const p = toGameCoords(e.clientX, e.clientY);
  if (scene === 'stageSelect') { stageDragStartY = p.y; stageDragLastY = p.y; }
  if (scene === 'album') { albumDragStartY = p.y; albumDragLastY = p.y; }
});
canvas.addEventListener('pointerup', () => { stageDragStartY = -1; albumDragStartY = -1; });
canvas.addEventListener('pointercancel', () => { stageDragStartY = -1; albumDragStartY = -1; });

function updateStageSelect() {
  // Smooth scroll
  stageScrollY += (stageScrollTarget - stageScrollY) * 0.2;
  const rows = Math.ceil(STAGES.length / 3);
  const maxScroll = Math.max(0, rows * 100 + 80 - 500);
  stageScrollTarget = Math.max(0, Math.min(maxScroll, stageScrollTarget));
  stageScrollY = Math.max(0, Math.min(maxScroll, stageScrollY));

  if (inputTapped) {
    // Check if it was a tap (not a drag)
    const dragDist = stageDragStartY >= 0 ? Math.abs(inputY - stageDragStartY) : 0;
    if (dragDist < 10) {
      for (let i = 0; i < STAGES.length; i++) {
        const col = i % 3;
        const row = Math.floor(i / 3);
        const cx = 35 + col * 125 + 40;
        const cy = 100 + row * 100 + 40 - stageScrollY;
        const r = 38;
        if (cy < 60 || cy > 600) continue; // off screen
        if (hitCircle(inputX, inputY, cx, cy, r)) {
          if (i === 0 || saveData.clearedStages.includes(i)) {
            sfxButton();
            startStage(STAGES[i]);
          }
        }
      }
      if (hitRect(inputX, inputY, 20, 640, 120, 45)) {
        sfxButton();
        scene = 'title';
      }
    }
  }
}

function drawStageSelect() {
  const grad = ctx.createLinearGradient(0, 0, 0, DESIGN_H);
  grad.addColorStop(0, '#E3F2FD');
  grad.addColorStop(1, '#BBDEFB');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

  ctx.fillStyle = '#1565C0';
  ctx.font = 'bold 26px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('ステージ えらび', DESIGN_W / 2, 40);

  // Progress
  const cleared = saveData.clearedStages.length;
  ctx.fillStyle = '#78909C';
  ctx.font = '14px sans-serif';
  ctx.fillText(`${cleared} / ${STAGES.length} クリア`, DESIGN_W / 2, 65);

  // Clip scroll area
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 80, DESIGN_W, 550);
  ctx.clip();

  for (let i = 0; i < STAGES.length; i++) {
    const col = i % 3;
    const row = Math.floor(i / 3);
    const cx = 35 + col * 125 + 40;
    const cy = 100 + row * 100 + 40 - stageScrollY;
    const r = 38;

    if (cy < 30 || cy > 680) continue; // culling

    const isCleared = saveData.clearedStages.includes(STAGES[i].id);
    const locked = i > 0 && !saveData.clearedStages.includes(i);

    // Color by zone
    let baseColor;
    if (locked) baseColor = '#B0BEC5';
    else if (isCleared) baseColor = '#81C784';
    else if (i < 10) baseColor = '#4FC3F7';
    else if (i < 20) baseColor = '#FFB74D';
    else baseColor = '#EF5350';

    ctx.fillStyle = baseColor;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (locked) {
      ctx.fillStyle = '#78909C';
      ctx.fillRect(cx - 7, cy - 1, 14, 10);
      ctx.strokeStyle = '#78909C'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy - 5, 6, Math.PI, 0); ctx.stroke();
    } else {
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 22px sans-serif';
      ctx.fillText(String(i + 1), cx, cy);
    }

    if (isCleared) {
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      for (let j = 0; j < 10; j++) {
        const a = (j * 36 - 90) * Math.PI / 180;
        const sr = j % 2 === 0 ? 8 : 3;
        if (j===0) ctx.moveTo(cx+Math.cos(a)*sr, cy-r-8+Math.sin(a)*sr);
        else ctx.lineTo(cx+Math.cos(a)*sr, cy-r-8+Math.sin(a)*sr);
      }
      ctx.fill();
    }
  }
  ctx.restore();

  // Scroll indicator
  const rows = Math.ceil(STAGES.length / 3);
  const maxScroll = Math.max(1, rows * 100 + 80 - 500);
  if (maxScroll > 0) {
    const barH = 550 * (550 / (rows * 100 + 80));
    const barY = 80 + (stageScrollY / maxScroll) * (550 - barH);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    drawRoundRect(DESIGN_W - 8, barY, 5, barH, 2);
    ctx.fill();
  }

  drawButton(20, 640, 120, 45, 'もどる', '#78909C', '#FFF', 18);
}

let currentStage = null;
let iceHP = 0, iceMaxHP = 0;
let rocketCount = 0;
let questionsNeeded = 0;
let gamePhase = 'quiz'; // quiz, quizResult, rocketReady, rocketFire, iceBreak, rescue, cardGet, synthesis
let quizData = null;
let quizAttempt = 0;
let quizResultTimer = 0;
let selectedAnswer = -1;
let rocketAnim = null;
let rocketQueue = []; // bonus rockets in flight
let isBonus = false; // true during bonus rapid-fire phase
let rescueTimer = 0;
let droppedCards = [];
let cardGetTimer = 0;
let synthCards = []; // material cards consumed in synthesis (for animation)
let synthTimer = 0;
let synthResult = null;
let synthPhase = 0; // 0=show materials, 1=merge, 2=reveal card
let bearRunX = 0;
let bearRunTimer = 0;

function startStage(stage) {
  currentStage = stage;
  iceHP = stage.iceHP;
  iceMaxHP = stage.iceHP;
  rocketCount = 0;
  questionsNeeded = stage.rockets;
  gamePhase = 'quiz';
  quizAttempt = 0;
  droppedCards = [];
  synthCards = [];
  synthResult = null;
  rocketQueue = [];
  isBonus = false;
  particles.length = 0;
  generateQuiz();
  scene = 'game';
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function generateQuiz() {
  const mode = saveData.settings.questionMode;
  const level = currentStage.level;
  const stageId = currentStage.id;

  // Available question types - unlock progressively
  const types = [];
  if (mode !== 'letters') types.push('math');        // S1+
  if (mode !== 'numbers') types.push('picture');     // S1+
  if (stageId >= 5) types.push('direction');          // S5+
  if (stageId >= 10) types.push('counting');          // S10+: count objects
  if (stageId >= 15 && mode !== 'letters') types.push('subtract'); // S15+
  if (stageId >= 20) types.push('color');             // S20+: identify colors
  if (stageId >= 30) types.push('shape');             // S30+: identify shapes
  if (stageId >= 40 && mode !== 'numbers') types.push('katakana'); // S40+: katakana match
  if (stageId >= 50) types.push('sequence');          // S50+: number sequence

  const type = types[Math.floor(Math.random() * types.length)];

  if (type === 'math') {
    let maxA, maxB, maxAnswer;
    if (stageId <= 5) { maxA = 3; maxB = 3; maxAnswer = 5; }
    else if (stageId <= 10) { maxA = 5; maxB = 5; maxAnswer = 8; }
    else if (stageId <= 20) { maxA = 7; maxB = 7; maxAnswer = 10; }
    else if (stageId <= 25) { maxA = 9; maxB = 5; maxAnswer = 14; }
    else { maxA = 10; maxB = 9; maxAnswer = 19; }

    let a, b;
    do {
      a = 1 + Math.floor(Math.random() * maxA);
      b = 1 + Math.floor(Math.random() * maxB);
    } while (a + b > maxAnswer);

    const answer = a + b;
    const choices = [answer];
    while (choices.length < 3) {
      const off = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.floor(Math.random() * 3));
      const wrong = answer + off;
      if (wrong > 0 && wrong <= maxAnswer + 3 && !choices.includes(wrong)) choices.push(wrong);
    }
    shuffleArray(choices);
    quizData = { type: 'math', question: `${a} + ${b} = ?`, choices: choices.map(String),
      correctIndex: choices.indexOf(answer), disabledChoices: [] };

  } else if (type === 'subtract') {
    let maxA;
    if (stageId <= 20) maxA = 10;
    else if (stageId <= 25) maxA = 14;
    else maxA = 18;
    const a = 3 + Math.floor(Math.random() * (maxA - 2));
    const b = 1 + Math.floor(Math.random() * (a - 1));
    const answer = a - b;
    const choices = [answer];
    while (choices.length < 3) {
      const off = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.floor(Math.random() * 3));
      const wrong = answer + off;
      if (wrong >= 0 && !choices.includes(wrong)) choices.push(wrong);
    }
    shuffleArray(choices);
    quizData = { type: 'math', question: `${a} - ${b} = ?`, choices: choices.map(String),
      correctIndex: choices.indexOf(answer), disabledChoices: [] };

  } else if (type === 'direction') {
    const dirs = [
      { name: 'みぎ', arrow: '→' }, { name: 'ひだり', arrow: '←' },
      { name: 'うえ', arrow: '↑' }, { name: 'した', arrow: '↓' }
    ];
    const correct = dirs[Math.floor(Math.random() * dirs.length)];

    if (Math.random() < 0.5) {
      // Show arrow, choose name
      const wrongs = dirs.filter(d => d.name !== correct.name).map(d => d.name);
      shuffleArray(wrongs);
      const choices = shuffleArray([correct.name, wrongs[0], wrongs[1]]);
      quizData = { type: 'direction', question: correct.arrow,
        questionLabel: 'この やじるしは？', choices,
        correctIndex: choices.indexOf(correct.name), disabledChoices: [] };
    } else {
      // Show name, choose arrow
      const wrongs = dirs.filter(d => d.arrow !== correct.arrow).map(d => d.arrow);
      shuffleArray(wrongs);
      const choices = shuffleArray([correct.arrow, wrongs[0], wrongs[1]]);
      quizData = { type: 'direction', question: correct.name,
        questionLabel: 'どっちの ほうこう？', choices,
        correctIndex: choices.indexOf(correct.arrow), disabledChoices: [] };
    }

  } else if (type === 'counting') {
    // Count objects
    if (stageId >= 40 && Math.random() < 0.5) {
      // Advanced: two types of objects, ask about one
      const targetCount = 1 + Math.floor(Math.random() * 5);
      const otherCount = 1 + Math.floor(Math.random() * 4);
      const choices = [targetCount];
      while (choices.length < 3) {
        const off = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.floor(Math.random() * 2));
        const w = targetCount + off;
        if (w > 0 && w <= 10 && !choices.includes(w)) choices.push(w);
      }
      shuffleArray(choices);
      quizData = { type: 'counting_mixed', targetCount, otherCount,
        question: 'あかは いくつ？',
        choices: choices.map(String), correctIndex: choices.indexOf(targetCount), disabledChoices: [] };
    } else {
      // Simple: count same objects
      const count = 1 + Math.floor(Math.random() * (stageId >= 40 ? 9 : stageId >= 20 ? 7 : 5));
      const choices = [count];
      while (choices.length < 3) {
        const off = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.floor(Math.random() * 2));
        const w = count + off;
        if (w > 0 && w <= 10 && !choices.includes(w)) choices.push(w);
      }
      shuffleArray(choices);
      quizData = { type: 'counting', count, question: 'いくつ あるかな？',
        choices: choices.map(String), correctIndex: choices.indexOf(count), disabledChoices: [] };
    }

  } else if (type === 'color') {
    // Identify color
    const colors = [
      { name: 'あか', hex: '#EF5350' }, { name: 'あお', hex: '#42A5F5' },
      { name: 'きいろ', hex: '#FFEE58' }, { name: 'みどり', hex: '#66BB6A' },
      { name: 'オレンジ', hex: '#FFA726' }, { name: 'むらさき', hex: '#AB47BC' },
      { name: 'ピンク', hex: '#EC407A' },
    ];
    const correct = colors[Math.floor(Math.random() * colors.length)];
    const wrongs = colors.filter(c => c.name !== correct.name);
    shuffleArray(wrongs);
    const choices = shuffleArray([correct.name, wrongs[0].name, wrongs[1].name]);
    quizData = { type: 'color', colorHex: correct.hex, question: 'なにいろ？',
      choices, correctIndex: choices.indexOf(correct.name), disabledChoices: [] };

  } else if (type === 'shape') {
    // Identify shape
    const shapes = [
      { name: 'まる', draw: 'circle' }, { name: 'さんかく', draw: 'triangle' },
      { name: 'しかく', draw: 'square' }, { name: 'ほし', draw: 'star_shape' },
      { name: 'ハート', draw: 'heart_shape' },
    ];
    const correct = shapes[Math.floor(Math.random() * shapes.length)];
    const wrongs = shapes.filter(s => s.name !== correct.name);
    shuffleArray(wrongs);
    const choices = shuffleArray([correct.name, wrongs[0].name, wrongs[1].name]);
    quizData = { type: 'shape', shapeDraw: correct.draw, question: 'このかたちは？',
      choices, correctIndex: choices.indexOf(correct.name), disabledChoices: [] };

  } else if (type === 'katakana') {
    // Show hiragana, choose matching katakana
    const pairs = [
      { h: 'あ', k: 'ア' }, { h: 'い', k: 'イ' }, { h: 'う', k: 'ウ' }, { h: 'え', k: 'エ' }, { h: 'お', k: 'オ' },
      { h: 'か', k: 'カ' }, { h: 'き', k: 'キ' }, { h: 'く', k: 'ク' }, { h: 'け', k: 'ケ' }, { h: 'こ', k: 'コ' },
      { h: 'さ', k: 'サ' }, { h: 'し', k: 'シ' }, { h: 'す', k: 'ス' }, { h: 'せ', k: 'セ' }, { h: 'そ', k: 'ソ' },
      { h: 'た', k: 'タ' }, { h: 'ち', k: 'チ' }, { h: 'つ', k: 'ツ' }, { h: 'て', k: 'テ' }, { h: 'と', k: 'ト' },
      { h: 'な', k: 'ナ' }, { h: 'に', k: 'ニ' }, { h: 'ぬ', k: 'ヌ' }, { h: 'ね', k: 'ネ' }, { h: 'の', k: 'ノ' },
    ];
    const correct = pairs[Math.floor(Math.random() * pairs.length)];
    const wrongs = pairs.filter(p => p.k !== correct.k);
    shuffleArray(wrongs);
    const choices = shuffleArray([correct.k, wrongs[0].k, wrongs[1].k]);
    quizData = { type: 'direction', question: correct.h,
      questionLabel: 'おなじ もじの カタカナは？', choices,
      correctIndex: choices.indexOf(correct.k), disabledChoices: [] };

  } else if (type === 'sequence') {
    // Number sequence: _, 2, 3 or 3, _, 5
    const start = 1 + Math.floor(Math.random() * (stageId >= 70 ? 15 : 8));
    const pos = Math.floor(Math.random() * 3); // which position is blank
    const nums = [start, start + 1, start + 2];
    const answer = nums[pos];
    const display = nums.map((n, i) => i === pos ? '?' : String(n)).join(', ');
    const choices = [answer];
    while (choices.length < 3) {
      const off = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.floor(Math.random() * 2));
      const w = answer + off;
      if (w > 0 && !choices.includes(w)) choices.push(w);
    }
    shuffleArray(choices);
    quizData = { type: 'math', question: display, choices: choices.map(String),
      correctIndex: choices.indexOf(answer), disabledChoices: [] };

  } else {
    // Picture-name quiz
    const pool = PICTURE_QUIZ[level] || PICTURE_QUIZ[1];
    const item = pool[Math.floor(Math.random() * pool.length)];
    const choices = shuffleArray([item.word, ...item.wrongs]);

    quizData = {
      type: 'picture',
      question: item.word,
      drawing: item.drawing,
      questionLabel: 'この え の なまえは？',
      choices,
      correctIndex: choices.indexOf(item.word),
      disabledChoices: []
    };
  }
  quizAttempt = 0;
  selectedAnswer = -1;
}

function rollDrop() {
  const rand = Math.random();
  let cumulative = 0;

  // First clear: prioritize unowned materials
  const isFirstClear = !saveData.clearedStages.includes(currentStage.id);

  if (isFirstClear) {
    const unowned = MATERIALS.filter(m => saveData.materials[m.id] === 0);
    if (unowned.length > 0) {
      return unowned[Math.floor(Math.random() * unowned.length)];
    }
  }

  // Boost rare materials in later stages
  const stageId = currentStage.id;
  const rareBoost = stageId >= 20 ? 2.5 : stageId >= 10 ? 1.8 : stageId >= 5 ? 1.3 : 1;

  for (const mat of MATERIALS) {
    let rate = mat.dropRate;
    if (mat.id === 'star' || mat.id === 'shell' || mat.id === 'aurora') rate *= rareBoost;
    // Aurora only drops from stage 15+
    if (mat.id === 'aurora' && stageId < 15) rate = 0;
    // Shell only drops from stage 8+
    if (mat.id === 'shell' && stageId < 8) rate = 0;
    cumulative += rate;
    if (rand < cumulative) return mat;
  }
  return MATERIALS[0];
}

function checkAutoSynth() {
  // Check recipes in priority order (highest rarity first)
  for (const recipe of RECIPES) {
    let canMake = true;
    for (const [matId, count] of Object.entries(recipe.recipe)) {
      if ((saveData.materials[matId] || 0) < count) {
        canMake = false;
        break;
      }
    }
    if (canMake) {
      // Build list of consumed materials for animation
      synthCards = [];
      for (const [matId, count] of Object.entries(recipe.recipe)) {
        for (let n = 0; n < count; n++) synthCards.push(matId);
        saveData.materials[matId] -= count;
      }
      saveData.completedCards[recipe.id] = (saveData.completedCards[recipe.id] || 0) + 1;
      saveGame();
      return recipe;
    }
  }
  return null;
}

function updateGame() {
  sceneTimer++;

  if (gamePhase === 'quiz') {
    if (inputTapped && quizData) {
      // Check 3 answer buttons
      for (let i = 0; i < 3; i++) {
        if (quizData.disabledChoices.includes(i)) continue;
        const bx = 40, by = 440 + i * 65, bw = 320, bh = 55;
        if (hitRect(inputX, inputY, bx, by, bw, bh)) {
          selectedAnswer = i;
          if (i === quizData.correctIndex) {
            // Correct!
            sfxCorrect();
            saveData.stats.totalQuestions++;
            saveData.stats.totalCorrect++;
            rocketCount++;
            // Bonus chance
            if (Math.random() < 0.3) rocketCount++;
            questionsNeeded--;
            gamePhase = 'quizResult';
            quizResultTimer = 60;
          } else {
            // Wrong
            sfxWrong();
            saveData.stats.totalQuestions++;
            quizAttempt++;
            if (quizAttempt >= 2) {
              // Give rocket anyway, show correct
              rocketCount++;
              questionsNeeded--;
              gamePhase = 'quizResult';
              quizResultTimer = 90; // longer to show correct answer
            } else {
              // Hint: disable this choice
              quizData.disabledChoices.push(i);
              gamePhase = 'quizResult';
              quizResultTimer = 45;
            }
          }
        }
      }
    }
  } else if (gamePhase === 'quizResult') {
    quizResultTimer--;
    if (quizResultTimer <= 0) {
      if (quizAttempt < 2 && selectedAnswer !== quizData.correctIndex) {
        // Back to same quiz with hint
        gamePhase = 'quiz';
        selectedAnswer = -1;
      } else {
        // Got rocket(s) - auto-fire one immediately
        gamePhase = 'rocketFire';
        sfxLaunch();
        rocketCount--;
        rocketAnim = { x: DESIGN_W / 2, y: 580, targetY: 160, progress: 0 };
      }
    }
  } else if (gamePhase === 'rocketReady') {
    // Bonus: tap anywhere to fire all remaining rockets rapidly
    if (inputTapped && rocketCount > 0) {
      isBonus = true;
      // Launch all remaining rockets with staggered timing
      while (rocketCount > 0) {
        rocketCount--;
        const spread = (Math.random() - 0.5) * 60;
        rocketQueue.push({
          x: DESIGN_W / 2 + spread, y: 580,
          targetY: 150 + Math.random() * 20,
          progress: -rocketQueue.length * 0.08, // stagger start
        });
      }
      sfxLaunch();
      gamePhase = 'rocketFire';
    } else if (rocketCount <= 0) {
      generateQuiz();
      gamePhase = 'quiz';
    }
  } else if (gamePhase === 'rocketFire') {
    // Update single rocket (from quiz answer)
    if (rocketAnim) {
      rocketAnim.progress += 0.04;
      rocketAnim.y = 580 + (rocketAnim.targetY - 580) * Math.min(1, rocketAnim.progress);
      if (sceneTimer % 2 === 0) {
        addParticle(rocketAnim.x + (Math.random()-0.5)*6, rocketAnim.y + 15,
          'shard', `hsl(${30+Math.random()*30}, 100%, ${50+Math.random()*30}%)`,
          (Math.random()-0.5)*2, 2 + Math.random()*2, 20);
      }
      if (rocketAnim.progress >= 1) {
        sfxHit();
        triggerShake(4, 10);
        const damage = iceMaxHP / currentStage.rockets;
        iceHP = Math.max(0, iceHP - damage);
        spawnIceShards(DESIGN_W / 2, 180, 12);
        rocketAnim = null;
      }
    }

    // Update bonus rocket queue
    for (let i = rocketQueue.length - 1; i >= 0; i--) {
      const r = rocketQueue[i];
      r.progress += 0.05;
      if (r.progress >= 0) {
        r.y = 580 + (r.targetY - 580) * Math.min(1, r.progress);
        if (sceneTimer % 2 === 0) {
          addParticle(r.x + (Math.random()-0.5)*6, r.y + 15,
            'shard', `hsl(${30+Math.random()*30}, 100%, ${50+Math.random()*30}%)`,
            (Math.random()-0.5)*2, 2 + Math.random()*2, 20);
        }
      }
      if (r.progress >= 1) {
        sfxHit();
        triggerShake(3, 6);
        const damage = iceMaxHP / currentStage.rockets;
        iceHP = Math.max(0, iceHP - damage);
        spawnIceShards(DESIGN_W / 2 + (Math.random()-0.5)*40, 180, 8);
        rocketQueue.splice(i, 1);
      }
    }

    // Check if all rockets done
    if (!rocketAnim && rocketQueue.length === 0) {
      isBonus = false;
      if (iceHP <= 0) {
        sfxBreak();
        triggerShake(8, 20);
        spawnIceShards(DESIGN_W / 2, 180, 30);
        gamePhase = 'iceBreak';
        sceneTimer = 0;
      } else if (rocketCount > 0) {
        gamePhase = 'rocketReady';
      } else {
        generateQuiz();
        gamePhase = 'quiz';
      }
    }
  } else if (gamePhase === 'iceBreak') {
    if (sceneTimer > 40) {
      sfxRescue();
      gamePhase = 'rescue';
      bearRunX = DESIGN_W / 2;
      bearRunTimer = 0;
      spawnHearts(DESIGN_W / 2, 200, 8);
    }
  } else if (gamePhase === 'rescue') {
    bearRunTimer++;
    bearRunX += 2.5;
    spawnSparkles(bearRunX, 200, 1);
    if (bearRunTimer > 80) {
      // Drop cards
      const dropCount = currentStage.drops;
      droppedCards = [];
      for (let i = 0; i < dropCount; i++) {
        const mat = rollDrop();
        droppedCards.push(mat);
        saveData.materials[mat.id]++;
      }
      // Mark stage as cleared
      if (!saveData.clearedStages.includes(currentStage.id)) {
        saveData.clearedStages.push(currentStage.id);
      }
      saveGame();
      sfxCardGet();
      gamePhase = 'cardGet';
      cardGetTimer = 0;
    }
  } else if (gamePhase === 'cardGet') {
    cardGetTimer++;
    if (cardGetTimer > 30) {
      spawnSparkles(DESIGN_W / 2, 350, 2);
    }
    if (inputTapped && cardGetTimer > 60) {
      // Check for auto synthesis
      synthResult = checkAutoSynth();
      if (synthResult) {
        gamePhase = 'synthesis';
        synthTimer = 0;
        synthPhase = 0; // start with showing materials
        // Play a subtle hint sound
        playTone(440, 0.15, 'triangle', 0.2);
      } else {
        scene = 'stageSelect';
      }
    }
  } else if (gamePhase === 'synthesis') {
    synthTimer++;
    if (synthPhase === 0 && synthTimer > 50) {
      // Materials shown long enough, start merge
      synthPhase = 1;
      synthTimer = 0;
      playTone(523, 0.2, 'sine', 0.2);
    } else if (synthPhase === 1 && synthTimer > 40) {
      // Merge done, reveal card
      synthPhase = 2;
      synthTimer = 0;
      sfxSynth();
      spawnSparkles(DESIGN_W / 2, 320, 40);
      spawnHearts(DESIGN_W / 2, 320, 5);
    } else if (synthPhase === 2) {
      if (synthTimer < 30) spawnSparkles(DESIGN_W / 2, 320, 2);
      if (inputTapped && synthTimer > 60) {
        // Check for another synthesis
        const nextSynth = checkAutoSynth();
        if (nextSynth) {
          synthResult = nextSynth;
          synthTimer = 0;
          synthPhase = 0;
          playTone(440, 0.15, 'triangle', 0.2);
        } else {
          scene = 'stageSelect';
        }
      }
    }
  }
}

function drawGame() {
  // Background - changes by zone
  const grad = ctx.createLinearGradient(0, 0, 0, DESIGN_H);
  const zone = Math.floor((currentStage.id - 1) / 10);
  const zones = [
    { bg1: '#E3F2FD', bg2: '#E1F5FE', text: '#1565C0' }, // 1-10 ice blue
    { bg1: '#FFF3E0', bg2: '#FFE0B2', text: '#E65100' }, // 11-20 sunset
    { bg1: '#F3E5F5', bg2: '#E1BEE7', text: '#6A1B9A' }, // 21-30 aurora
    { bg1: '#E8F5E9', bg2: '#C8E6C9', text: '#2E7D32' }, // 31-40 forest
    { bg1: '#FCE4EC', bg2: '#F8BBD0', text: '#C2185B' }, // 41-50 cherry
    { bg1: '#ECEFF1', bg2: '#CFD8DC', text: '#37474F' }, // 51-60 twilight
    { bg1: '#FFFDE7', bg2: '#FFF9C4', text: '#F57F17' }, // 61-70 gold
    { bg1: '#E0F7FA', bg2: '#B2EBF2', text: '#00838F' }, // 71-80 ocean
    { bg1: '#FBE9E7', bg2: '#FFCCBC', text: '#BF360C' }, // 81-90 volcano
    { bg1: '#F3E5F5', bg2: '#CE93D8', text: '#4A148C' }, // 91-100 cosmic
  ];
  const z = zones[Math.min(zone, zones.length - 1)];
  grad.addColorStop(0, z.bg1); grad.addColorStop(1, z.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

  // Stage label
  ctx.fillStyle = z.text;
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`ステージ ${currentStage.id}`, 15, 30);

  // Rocket count (draw rocket icon instead of emoji)
  ctx.textAlign = 'right';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillStyle = '#FF5722';
  drawRocket(DESIGN_W - 55, 22, 10);
  ctx.fillStyle = '#1565C0';
  ctx.fillText(`x ${rocketCount}`, DESIGN_W - 15, 30);

  // Ice HP bar
  const barX = 40, barY = 55, barW = DESIGN_W - 80, barH = 14;
  ctx.fillStyle = '#B0BEC5';
  drawRoundRect(barX, barY, barW, barH, 7);
  ctx.fill();
  const hpRatio = iceHP / iceMaxHP;
  if (hpRatio > 0) {
    ctx.fillStyle = hpRatio > 0.5 ? '#4FC3F7' : hpRatio > 0.2 ? '#FFB74D' : '#EF5350';
    drawRoundRect(barX, barY, barW * hpRatio, barH, 7);
    ctx.fill();
  }
  ctx.fillStyle = '#546E7A';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('こおりのつよさ', DESIGN_W / 2, barY + barH + 14);

  // Ice block + bear
  if (iceHP > 0) {
    const iceX = DESIGN_W / 2 - 80, iceY = 100, iceW = 160, iceH = 180;
    // Bear behind ice (visible but muted)
    ctx.globalAlpha = 0.7;
    drawBear(DESIGN_W / 2, 200, 45);
    ctx.globalAlpha = 1;
    // Ice
    const crackLevel = Math.floor((1 - hpRatio) * 8);
    drawIceBlock(iceX, iceY, iceW, iceH, hpRatio, crackLevel);
  } else if (gamePhase === 'iceBreak') {
    // Bear celebrating
    drawBear(DESIGN_W / 2, 200, 45, true);
  } else if (gamePhase === 'rescue') {
    // Bear running
    drawBear(bearRunX, 200, 45, true);
  }

  // Rocket animations
  if (rocketAnim) {
    drawRocket(rocketAnim.x, rocketAnim.y, 20);
  }
  for (const r of rocketQueue) {
    if (r.progress >= 0) {
      drawRocket(r.x, r.y, 18);
    }
  }

  // Quiz area
  if (gamePhase === 'quiz' || gamePhase === 'quizResult') {
    if (quizData) {
      // Question
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      drawRoundRect(30, 310, DESIGN_W - 60, 100, 12);
      ctx.fill();

      if (quizData.type === 'math') {
        ctx.fillStyle = '#333';
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(quizData.question, DESIGN_W / 2, 370);
      } else if (quizData.type === 'direction') {
        ctx.fillStyle = '#333';
        ctx.font = 'bold 50px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(quizData.question, DESIGN_W / 2, 365);
        ctx.fillStyle = '#666';
        ctx.font = 'bold 18px sans-serif';
        ctx.fillText(quizData.questionLabel, DESIGN_W / 2, 400);
      } else if (quizData.type === 'counting' || quizData.type === 'counting_mixed') {
        const isMixed = quizData.type === 'counting_mixed';
        const totalRed = isMixed ? quizData.targetCount : quizData.count;
        const totalBlue = isMixed ? quizData.otherCount : 0;
        const total = totalRed + totalBlue;
        // Shuffle positions
        const items = [];
        for (let ci = 0; ci < totalRed; ci++) items.push('#EF5350');
        for (let ci = 0; ci < totalBlue; ci++) items.push('#42A5F5');
        shuffleArray(items);
        const cols = Math.min(5, total);
        const rows = Math.ceil(total / cols);
        for (let ci = 0; ci < total; ci++) {
          const col = ci % cols, row = Math.floor(ci / cols);
          const ox = DESIGN_W/2 - (cols-1)*18 + col*36;
          const oy = 345 - (rows-1)*14 + row*28;
          ctx.fillStyle = items[ci];
          ctx.beginPath(); ctx.arc(ox, oy, 10, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = '#666'; ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center'; ctx.fillText(quizData.question, DESIGN_W/2, 400);
      } else if (quizData.type === 'color') {
        // Draw a big colored circle
        ctx.fillStyle = quizData.colorHex;
        ctx.beginPath(); ctx.arc(DESIGN_W/2, 350, 30, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#666'; ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center'; ctx.fillText(quizData.question, DESIGN_W/2, 400);
      } else if (quizData.type === 'shape') {
        ctx.fillStyle = '#4FC3F7'; ctx.strokeStyle = '#1565C0'; ctx.lineWidth = 2;
        const cx = DESIGN_W/2, cy = 350, r = 25;
        if (quizData.shapeDraw === 'circle') { ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); ctx.stroke(); }
        else if (quizData.shapeDraw === 'triangle') { ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.lineTo(cx-r,cy+r); ctx.lineTo(cx+r,cy+r); ctx.closePath(); ctx.fill(); ctx.stroke(); }
        else if (quizData.shapeDraw === 'square') { ctx.fillRect(cx-r,cy-r,r*2,r*2); ctx.strokeRect(cx-r,cy-r,r*2,r*2); }
        else if (quizData.shapeDraw === 'star_shape') { ctx.beginPath(); for(let j=0;j<10;j++){const a=(j*36-90)*Math.PI/180;const sr=j%2===0?r:r*0.4;if(j===0)ctx.moveTo(cx+Math.cos(a)*sr,cy+Math.sin(a)*sr);else ctx.lineTo(cx+Math.cos(a)*sr,cy+Math.sin(a)*sr);}ctx.closePath(); ctx.fill(); ctx.stroke(); }
        else if (quizData.shapeDraw === 'heart_shape') { ctx.beginPath(); ctx.moveTo(cx,cy+r*0.7); ctx.bezierCurveTo(cx-r*1.5,cy-r*0.3,cx-r*0.5,cy-r*1.2,cx,cy-r*0.5); ctx.bezierCurveTo(cx+r*0.5,cy-r*1.2,cx+r*1.5,cy-r*0.3,cx,cy+r*0.7); ctx.fill(); ctx.stroke(); }
        ctx.fillStyle = '#666'; ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center'; ctx.fillText(quizData.question, DESIGN_W/2, 400);
      } else {
        // Picture-name quiz: show picture, choose name
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        drawRoundRect(30, 310, DESIGN_W - 60, 115, 12);
        ctx.fill();
        drawWordPicture(DESIGN_W / 2, 355, quizData.drawing, 80);
        ctx.fillStyle = '#666';
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(quizData.questionLabel, DESIGN_W / 2, 410);
      }

      // Answer buttons
      for (let i = 0; i < 3; i++) {
        const bx = 40, by = 440 + i * 65, bw = 320, bh = 55;
        const disabled = quizData.disabledChoices.includes(i);
        let color = '#4FC3F7';
        let textCol = '#FFF';

        if (gamePhase === 'quizResult') {
          if (i === quizData.correctIndex) {
            color = '#66BB6A'; // green for correct
          } else if (i === selectedAnswer && selectedAnswer !== quizData.correctIndex) {
            color = '#EF5350'; // red for wrong
          }
        }
        if (disabled && gamePhase !== 'quizResult') {
          color = '#B0BEC5';
          textCol = '#78909C';
        }

        drawButton(bx, by, bw, bh, quizData.choices[i], color, textCol, 28);
      }

      // Feedback message
      if (gamePhase === 'quizResult') {
        ctx.font = 'bold 22px sans-serif';
        ctx.textAlign = 'center';
        if (selectedAnswer === quizData.correctIndex) {
          ctx.fillStyle = '#2E7D32';
          ctx.fillText('せいかい！ロケット GET！', DESIGN_W / 2, 430);
        } else if (quizAttempt >= 2) {
          ctx.fillStyle = '#E65100';
          ctx.fillText('こたえは これだよ！ロケット1つ！', DESIGN_W / 2, 430);
        } else {
          ctx.fillStyle = '#F57C00';
          ctx.fillText('おしい！もういっかい！', DESIGN_W / 2, 430);
        }
      }
    }
  }

  // Rocket ready phase (bonus rockets)
  if (gamePhase === 'rocketReady' && rocketCount > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    drawRoundRect(30, 420, DESIGN_W - 60, 80, 12);
    ctx.fill();
    ctx.fillStyle = '#1565C0';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('ボーナス ロケット！', DESIGN_W / 2, 450);
    ctx.fillText('タップして はっしゃ！', DESIGN_W / 2, 480);

    // Draw rockets at bottom
    for (let i = 0; i < Math.min(rocketCount, 8); i++) {
      const rx = DESIGN_W / 2 - (Math.min(rocketCount, 8) * 19) + i * 38;
      drawRocket(rx, 560, 18);
    }

    // Pulsing hint
    const pulse = Math.sin(sceneTimer * 0.1) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#FF5722';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('どこでも タップ！', DESIGN_W / 2, 620);
    ctx.globalAlpha = 1;
  }

  // Card get phase
  if (gamePhase === 'cardGet') {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    // Milestone check
    if (currentStage.id % 10 === 0) {
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 32px sans-serif';
      ctx.fillText(`${currentStage.id}めん クリア！`, DESIGN_W / 2, 160);
      if (cardGetTimer < 60) spawnSparkles(DESIGN_W / 2, 160, 3);
    }
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 28px sans-serif';
    ctx.fillText('カード GET！', DESIGN_W / 2, 200);

    // Show dropped cards
    const totalW = droppedCards.length * 110;
    const startX = (DESIGN_W - totalW) / 2 + 10;
    for (let i = 0; i < droppedCards.length; i++) {
      const mat = droppedCards[i];
      const cardY = 240 + Math.sin(cardGetTimer * 0.05 + i) * 5;
      drawCard(startX + i * 110, cardY, 90, 120, '', mat.name, '#4FC3F7', true, mat.id);
    }

    if (cardGetTimer > 60) {
      const pulse = Math.sin(sceneTimer * 0.1) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#FFF';
      ctx.font = '20px sans-serif';
      ctx.fillText('タップして つぎへ', DESIGN_W / 2, 500);
      ctx.globalAlpha = 1;
    }
  }

  // Synthesis phase - 3-step animation
  if (gamePhase === 'synthesis' && synthResult) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';

    if (synthPhase === 0) {
      // Phase 0: Show material cards being consumed
      ctx.fillText('ごうせい はつどう！', DESIGN_W / 2, 140);
      const n = synthCards.length;
      const spacing = Math.min(80, (DESIGN_W - 60) / n);
      const startX = DESIGN_W / 2 - (n - 1) * spacing / 2 - 30;
      for (let i = 0; i < n; i++) {
        const matId = synthCards[i];
        const cx = startX + i * spacing;
        // Slight bobbing
        const bob = Math.sin(sceneTimer * 0.08 + i) * 4;
        drawCard(cx, 180 + bob, 60, 75, '', '', '#4FC3F7', false, matId);
      }
      // Arrow pointing down
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 40px sans-serif';
      const arrowPulse = Math.sin(sceneTimer * 0.15) * 5;
      ctx.fillText('▼', DESIGN_W / 2, 290 + arrowPulse);

      // Show target card outline (mystery)
      ctx.strokeStyle = 'rgba(255,215,0,0.5)';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      drawRoundRect(DESIGN_W / 2 - 55, 320, 110, 150, 8);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(255,215,0,0.3)';
      ctx.font = 'bold 40px sans-serif';
      ctx.fillText('?', DESIGN_W / 2, 405);

    } else if (synthPhase === 1) {
      // Phase 1: Cards merge toward center
      ctx.fillText('ごうせい ちゅう...', DESIGN_W / 2, 140);
      const n = synthCards.length;
      const progress = Math.min(1, synthTimer / 35);
      const eased = 1 - (1 - progress) * (1 - progress); // ease-out
      for (let i = 0; i < n; i++) {
        const matId = synthCards[i];
        const spacing = Math.min(80, (DESIGN_W - 60) / n);
        const startX = DESIGN_W / 2 - (n - 1) * spacing / 2 - 30 + i * spacing;
        const targetX = DESIGN_W / 2 - 30;
        const cx = startX + (targetX - startX) * eased;
        const cy = 180 + (320 - 180) * eased;
        const cardScale = 1 - eased * 0.3;
        const cardAlpha = 1 - eased * 0.5;
        ctx.globalAlpha = cardAlpha;
        drawCard(cx, cy, 60 * cardScale, 75 * cardScale, '', '', '#FFD700', true, matId);
        ctx.globalAlpha = 1;
      }
      // Glow at center growing
      if (progress > 0.5) {
        const glowSize = (progress - 0.5) * 2 * 60;
        const grad = ctx.createRadialGradient(DESIGN_W/2, 360, 0, DESIGN_W/2, 360, glowSize);
        grad.addColorStop(0, 'rgba(255,215,0,0.6)');
        grad.addColorStop(1, 'rgba(255,215,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(DESIGN_W/2 - glowSize, 360 - glowSize, glowSize*2, glowSize*2);
      }

    } else if (synthPhase === 2) {
      // Phase 2: Reveal completed card
      ctx.fillText('かんせい！', DESIGN_W / 2, 160);

      const isNew = saveData.completedCards[synthResult.id] === 1;
      // Card appears with scale animation
      const revealProgress = Math.min(1, synthTimer / 20);
      const cardScale = 0.5 + revealProgress * 0.5;
      const cardW = 130 * cardScale;
      const cardH = 180 * cardScale;
      drawCard(DESIGN_W / 2 - cardW / 2, 200, cardW, cardH, '', synthResult.name, synthResult.color, true);
      drawCardBear(DESIGN_W / 2, 200 + cardH * 0.38, cardH * 0.5 * cardScale, synthResult.id);

      // Rarity label
      ctx.fillStyle = synthResult.color === '#E0E0E0' ? '#666' : synthResult.color;
      ctx.font = 'bold 22px sans-serif';
      ctx.fillText(`${synthResult.stars} ${synthResult.label}`, DESIGN_W / 2, 420);

      if (isNew) {
        ctx.fillStyle = '#FF5722';
        ctx.font = 'bold 26px sans-serif';
        const newPulse = Math.sin(sceneTimer * 0.12) * 3;
        ctx.fillText('NEW!', DESIGN_W / 2, 455 + newPulse);
      }

      if (synthTimer > 60) {
        const pulse = Math.sin(sceneTimer * 0.1) * 0.3 + 0.7;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#FFF';
        ctx.font = '20px sans-serif';
        ctx.fillText('タップして つぎへ', DESIGN_W / 2, 550);
        ctx.globalAlpha = 1;
      }
    }
  }

  // Particles on top
  drawParticles();
}

// ============================================================
// 13. Album (Card Collection) Scene
// ============================================================
let albumFrom = 'title';
let albumScrollY = 0;
let albumScrollTarget = 0;
let albumDragStartY = -1;
let albumDragLastY = -1;

function updateAlbum() {
  // Smooth scroll
  albumScrollY += (albumScrollTarget - albumScrollY) * 0.2;
  const matRows = Math.ceil(MATERIALS.length / 2);
  const contentH = 80 + matRows * 75 + 40 + RECIPES.length * 95 + 60;
  const maxScroll = Math.max(0, contentH - 580);
  albumScrollTarget = Math.max(0, Math.min(maxScroll, albumScrollTarget));
  albumScrollY = Math.max(0, Math.min(maxScroll, albumScrollY));

  if (inputTapped) {
    const dragDist = albumDragStartY >= 0 ? Math.abs(inputY - albumDragStartY) : 0;
    if (dragDist < 10 && hitRect(inputX, inputY, 20, 640, 120, 45)) {
      sfxButton();
      scene = albumFrom;
      albumScrollY = 0; albumScrollTarget = 0;
    }
  }
}

function drawAlbum() {
  const grad = ctx.createLinearGradient(0, 0, 0, DESIGN_H);
  grad.addColorStop(0, '#FFF3E0');
  grad.addColorStop(1, '#FFE0B2');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

  ctx.fillStyle = '#E65100';
  ctx.font = 'bold 26px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('カード ずかん', DESIGN_W / 2, 40);

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 55, DESIGN_W, 580);
  ctx.clip();

  const oY = -albumScrollY;

  // Materials section
  ctx.fillStyle = '#795548';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('そざいカード', 25, 75 + oY);

  for (let i = 0; i < MATERIALS.length; i++) {
    const mat = MATERIALS[i];
    const mx = 20 + (i % 2) * 190;
    const my = 90 + Math.floor(i / 2) * 75 + oY;
    if (my > -80 && my < 700) {
      const count = saveData.materials[mat.id] || 0;
      drawCard(mx, my, 65, 60, '', '', count > 0 ? '#4FC3F7' : '#B0BEC5', false, mat.id);
      ctx.fillStyle = count > 0 ? '#333' : '#999';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(mat.name, mx + 72, my + 25);
      ctx.font = 'bold 15px sans-serif';
      ctx.fillText(`x ${count}`, mx + 72, my + 45);
    }
  }

  const matRows = Math.ceil(MATERIALS.length / 2);
  const compStartY = 90 + matRows * 75 + 20 + oY;

  ctx.fillStyle = '#795548';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('かんせいカード', 25, compStartY);

  for (let i = 0; i < RECIPES.length; i++) {
    const recipe = RECIPES[RECIPES.length - 1 - i];
    const cy = compStartY + 20 + i * 95;
    if (cy > -100 && cy < 700) {
      const count = saveData.completedCards[recipe.id] || 0;
      const owned = count > 0;

      if (owned) {
        drawCard(20, cy, 70, 82, '', recipe.name, recipe.color, true);
        drawCardBear(20 + 35, cy + 28, 50, recipe.id);
      } else {
        drawCard(20, cy, 70, 82, '', '???', '#B0BEC5');
        ctx.fillStyle = '#B0BEC5';
        ctx.font = 'bold 24px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('?', 55, cy + 38);
      }

      ctx.fillStyle = owned ? '#333' : '#999';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(owned ? recipe.name : '???', 100, cy + 18);
      ctx.fillStyle = recipe.color === '#E0E0E0' ? '#666' : recipe.color;
      ctx.font = '12px sans-serif';
      ctx.fillText(`${recipe.stars} ${recipe.label}`, 100, cy + 36);

      if (owned) {
        ctx.fillStyle = '#333';
        ctx.fillText(`もってる: ${count}まい`, 100, cy + 52);
      } else {
        ctx.fillStyle = '#999';
        let needed = [];
        for (const [matId, req] of Object.entries(recipe.recipe)) {
          const have = saveData.materials[matId] || 0;
          const mat = MATERIALS.find(m => m.id === matId);
          if (have < req) needed.push(`${mat.name.slice(0,3)}あと${req - have}`);
        }
        if (needed.length > 0) {
          ctx.font = '10px sans-serif';
          ctx.fillText(needed.join(' '), 100, cy + 52);
        }
      }
    }
  }

  ctx.restore();

  drawButton(20, 640, 120, 45, 'もどる', '#78909C', '#FFF', 18);
}

// ============================================================
// 14. Main Loop
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  // Clear
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.scale(scale, scale);
  applyShake();

  sceneTimer++;

  // Update & Draw based on scene
  switch (scene) {
    case 'title':
      updateTitle();
      drawTitle();
      break;
    case 'stageSelect':
      updateStageSelect();
      drawStageSelect();
      break;
    case 'game':
      updateGame();
      drawGame();
      break;
    case 'album':
      updateAlbum();
      drawAlbum();
      break;
  }

  updateParticles();

  ctx.restore();

  // Reset input
  inputTapped = false;

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

</script>
