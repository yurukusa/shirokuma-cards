let currentStage = null;
let iceHP = 0, iceMaxHP = 0;
let rocketCount = 0;
let questionsNeeded = 0;
let gamePhase = 'quiz'; // quiz, quizResult, rocketReady, rocketFire, iceBreak, rescue, cardGet, synthesis
let quizData = null;
let lastQuizType = '';
let lastQuizKey = '';  // prevents same question twice in a row
let isFirstQuizOfStage = true;
let quizAttempt = 0;
let quizResultTimer = 0;
let selectedAnswer = -1;
let rocketAnim = null;
let rocketQueue = []; // bonus rockets in flight
let isBonus = false; // true during bonus rapid-fire phase
let rescueTimer = 0;
let droppedCards = [];
let cardGetTimer = 0;
let synthCards = []; // material cards consumed in synthesis (for animation)
let synthTimer = 0;
let synthResult = null;
let synthPhase = 0; // 0=show materials, 1=merge, 2=reveal card
let bearRunX = 0;
let bearRunTimer = 0;

function startStage(stage) {
  currentStage = stage;
  iceHP = stage.iceHP;
  iceMaxHP = stage.iceHP;
  rocketCount = 0;
  questionsNeeded = stage.rockets;
  gamePhase = 'quiz';
  quizAttempt = 0;
  droppedCards = [];
  synthCards = [];
  synthResult = null;
  rocketQueue = [];
  isBonus = false;
  isFirstQuizOfStage = true;
  particles.length = 0;
  generateQuiz();
  scene = 'game';
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function generateQuiz() {
  const mode = saveData.settings.questionMode;
  const level = currentStage.level;
  const stageId = currentStage.id;

  // Question type unlock table: [stageThreshold, typeId, modeRestriction]
  const unlockTable = [
    [1, 'math', 'noLetters'], [1, 'picture', 'noNumbers'],
    [15, 'direction', null], [30, 'counting', null],
    [45, 'subtract', 'noLetters'], [60, 'color', null],
    [75, 'compare', null], [90, 'shape', null],
    [45, 'katakana', 'noNumbers'], [120, 'sequence', null],
    [135, 'multiply', null], [150, 'divide', null], [165, 'kanji', null],
  ];

  const types = [];
  let newestType = null;
  for (const [threshold, tid, restriction] of unlockTable) {
    if (stageId < threshold) continue;
    if (restriction === 'noLetters' && mode === 'letters') continue;
    if (restriction === 'noNumbers' && mode === 'numbers') continue;
    types.push(tid);
    if (stageId >= threshold && stageId < threshold + 15) newestType = tid;
  }

  let type;
  // First quiz of a stage where a new type unlocked: force that type
  if (isFirstQuizOfStage && newestType && stageId % 15 === 0) {
    type = newestType;
  } else {
    // Weighted selection: newer types more likely, basic types less likely at high stages
    const weights = types.map(t => {
      const entry = unlockTable.find(e => e[1] === t);
      const age = stageId - entry[0]; // how long since unlocked
      // Newer types get higher weight; old basics get lower weight at high stages
      if (age < 15) return 3;  // just unlocked: high chance
      if (age < 45) return 2;  // recent: normal
      return 1;                // old: lower but still possible (review)
    });
    const totalW = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * totalW;
    type = types[types.length - 1];
    for (let i = 0; i < types.length; i++) {
      r -= weights[i];
      if (r <= 0) { type = types[i]; break; }
    }
    // Avoid same type twice in a row
    if (type === lastQuizType && types.length > 1) {
      const others = types.filter(t => t !== lastQuizType);
      type = others[Math.floor(Math.random() * others.length)];
    }
  }
  isFirstQuizOfStage = false;

  if (type === 'math') {
    // 30% chance of easy review problem at higher stages
    const effectiveStage = (stageId > 10 && Math.random() < 0.3) ? 1 + Math.floor(Math.random() * 10) : stageId;
    let maxA, maxB, maxAnswer;
    if (effectiveStage <= 5) { maxA = 3; maxB = 3; maxAnswer = 5; }
    else if (effectiveStage <= 10) { maxA = 5; maxB = 5; maxAnswer = 8; }
    else if (effectiveStage <= 20) { maxA = 7; maxB = 7; maxAnswer = 10; }
    else if (effectiveStage <= 25) { maxA = 9; maxB = 5; maxAnswer = 14; }
    else { maxA = 10; maxB = 9; maxAnswer = 19; }

    let a, b;
    do {
      a = 1 + Math.floor(Math.random() * maxA);
      b = 1 + Math.floor(Math.random() * maxB);
    } while (a + b > maxAnswer);

    const answer = a + b;
    const choices = [answer];
    while (choices.length < 3) {
      const off = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.floor(Math.random() * 3));
      const wrong = answer + off;
      if (wrong > 0 && wrong <= maxAnswer + 3 && !choices.includes(wrong)) choices.push(wrong);
    }
    shuffleArray(choices);
    quizData = { type: 'math', question: `${a} + ${b} = ?`, choices: choices.map(String),
      correctIndex: choices.indexOf(answer), disabledChoices: [] };

  } else if (type === 'subtract') {
    // 30% chance of easy review
    const effSt = (stageId > 25 && Math.random() < 0.3) ? 15 + Math.floor(Math.random() * 10) : stageId;
    let minA, maxA, maxB;
    if (effSt <= 20) { minA = 3; maxA = 7; maxB = 3; }       // 3-1 ~ 7-3 (easy single digit)
    else if (effSt <= 30) { minA = 4; maxA = 9; maxB = 5; }   // 4-1 ~ 9-5
    else if (effSt <= 40) { minA = 5; maxA = 10; maxB = 7; }  // 5-2 ~ 10-7
    else if (effSt <= 60) { minA = 10; maxA = 15; maxB = 9; } // 10-3 ~ 15-9 (2digit - 1digit)
    else if (effSt <= 80) { minA = 11; maxA = 18; maxB = 9; } // 11-4 ~ 18-9
    else { minA = 12; maxA = 19; maxB = 9; }                    // 12-5 ~ 19-9
    const a = minA + Math.floor(Math.random() * (maxA - minA + 1));
    const b = 1 + Math.floor(Math.random() * Math.min(maxB, a - 1));
    const answer = a - b;
    const choices = [answer];
    while (choices.length < 3) {
      const off = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.floor(Math.random() * 3));
      const wrong = answer + off;
      if (wrong >= 0 && wrong <= 20 && !choices.includes(wrong)) choices.push(wrong);
    }
    shuffleArray(choices);
    quizData = { type: 'math', question: `${a} − ${b} = ?`, choices: choices.map(String),
      correctIndex: choices.indexOf(answer), disabledChoices: [] };

  } else if (type === 'direction') {
    const dirs = [
      { name: 'みぎ', arrow: '→' }, { name: 'ひだり', arrow: '←' },
      { name: 'うえ', arrow: '↑' }, { name: 'した', arrow: '↓' }
    ];
    const correct = dirs[Math.floor(Math.random() * dirs.length)];

    if (Math.random() < 0.5) {
      // Show arrow, choose name
      const wrongs = dirs.filter(d => d.name !== correct.name).map(d => d.name);
      shuffleArray(wrongs);
      const choices = shuffleArray([correct.name, wrongs[0], wrongs[1]]);
      quizData = { type: 'direction', question: correct.arrow,
        questionLabel: 'この やじるしは？', choices,
        correctIndex: choices.indexOf(correct.name), disabledChoices: [] };
    } else {
      // Show name, choose arrow
      const wrongs = dirs.filter(d => d.arrow !== correct.arrow).map(d => d.arrow);
      shuffleArray(wrongs);
      const choices = shuffleArray([correct.arrow, wrongs[0], wrongs[1]]);
      quizData = { type: 'direction', question: correct.name,
        questionLabel: 'どっちの ほうこう？', choices,
        correctIndex: choices.indexOf(correct.arrow), disabledChoices: [] };
    }

  } else if (type === 'counting') {
    // Count objects
    if (stageId >= 60 && Math.random() < 0.5) {
      // Advanced: two types of objects, ask about one
      const targetCount = 1 + Math.floor(Math.random() * 5);
      const otherCount = 1 + Math.floor(Math.random() * 4);
      const choices = [targetCount];
      while (choices.length < 3) {
        const off = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.floor(Math.random() * 2));
        const w = targetCount + off;
        if (w > 0 && w <= 10 && !choices.includes(w)) choices.push(w);
      }
      shuffleArray(choices);
      quizData = { type: 'counting_mixed', targetCount, otherCount,
        question: 'あかは いくつ？',
        choices: choices.map(String), correctIndex: choices.indexOf(targetCount), disabledChoices: [] };
    } else {
      // Simple: count same objects
      const count = 1 + Math.floor(Math.random() * (stageId >= 40 ? 9 : stageId >= 20 ? 7 : 5));
      const choices = [count];
      while (choices.length < 3) {
        const off = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.floor(Math.random() * 2));
        const w = count + off;
        if (w > 0 && w <= 10 && !choices.includes(w)) choices.push(w);
      }
      shuffleArray(choices);
      quizData = { type: 'counting', count, question: 'いくつ あるかな？',
        choices: choices.map(String), correctIndex: choices.indexOf(count), disabledChoices: [] };
    }

  } else if (type === 'color') {
    // Identify color
    const colors = [
      { name: 'あか', hex: '#EF5350' }, { name: 'あお', hex: '#42A5F5' },
      { name: 'きいろ', hex: '#FFEE58' }, { name: 'みどり', hex: '#66BB6A' },
      { name: 'オレンジ', hex: '#FFA726' }, { name: 'むらさき', hex: '#AB47BC' },
      { name: 'ピンク', hex: '#EC407A' },
    ];
    const correct = colors[Math.floor(Math.random() * colors.length)];
    const wrongs = colors.filter(c => c.name !== correct.name);
    shuffleArray(wrongs);
    const choices = shuffleArray([correct.name, wrongs[0].name, wrongs[1].name]);
    quizData = { type: 'color', colorHex: correct.hex, question: 'なにいろ？',
      choices, correctIndex: choices.indexOf(correct.name), disabledChoices: [] };

  } else if (type === 'shape') {
    // Identify shape
    const shapes = [
      { name: 'まる', draw: 'circle' }, { name: 'さんかく', draw: 'triangle' },
      { name: 'しかく', draw: 'square' }, { name: 'ほし', draw: 'star_shape' },
      { name: 'ハート', draw: 'heart_shape' },
    ];
    const correct = shapes[Math.floor(Math.random() * shapes.length)];
    const wrongs = shapes.filter(s => s.name !== correct.name);
    shuffleArray(wrongs);
    const choices = shuffleArray([correct.name, wrongs[0].name, wrongs[1].name]);
    quizData = { type: 'shape', shapeDraw: correct.draw, question: 'このかたちは？',
      choices, correctIndex: choices.indexOf(correct.name), disabledChoices: [] };

  } else if (type === 'compare') {
    // Comparison: big/small, long/short, many/few, or number comparison
    const subtype = Math.floor(Math.random() * 4);
    if (subtype === 0) {
      // Big vs small circles
      const bigSide = Math.random() < 0.5 ? 'ひだり' : 'みぎ';
      const choices = shuffleArray(['ひだり', 'みぎ']);
      quizData = { type: 'compare_size', bigSide, question: 'おおきいのは？',
        choices: [...choices, 'おなじ'], correctIndex: choices.indexOf(bigSide), disabledChoices: [] };
    } else if (subtype === 1) {
      // Long vs short lines
      const longSide = Math.random() < 0.5 ? 'ひだり' : 'みぎ';
      const choices = shuffleArray(['ひだり', 'みぎ']);
      quizData = { type: 'compare_length', longSide, question: 'ながいのは？',
        choices: [...choices, 'おなじ'], correctIndex: choices.indexOf(longSide), disabledChoices: [] };
    } else if (subtype === 2) {
      // Many vs few dots
      const a = 2 + Math.floor(Math.random() * 4);
      const b = a + 1 + Math.floor(Math.random() * 3);
      const manySide = Math.random() < 0.5 ? 'ひだり' : 'みぎ';
      const leftCount = manySide === 'ひだり' ? b : a;
      const rightCount = manySide === 'みぎ' ? b : a;
      const choices = shuffleArray(['ひだり', 'みぎ']);
      quizData = { type: 'compare_many', leftCount, rightCount, question: 'おおいのは？',
        choices: [...choices, 'おなじ'], correctIndex: choices.indexOf(manySide), disabledChoices: [] };
    } else {
      // Number comparison: which is bigger?
      const a = 1 + Math.floor(Math.random() * (stageId >= 60 ? 19 : 9));
      let b;
      do { b = 1 + Math.floor(Math.random() * (stageId >= 60 ? 19 : 9)); } while (b === a);
      const answer = a > b ? String(a) : String(b);
      const choices = shuffleArray([String(a), String(b)]);
      quizData = { type: 'direction', question: `${a}  と  ${b}`,
        questionLabel: 'おおきいかずは？', choices: [...choices, 'おなじ'],
        correctIndex: choices.indexOf(answer), disabledChoices: [] };
    }

  } else if (type === 'katakana') {
    // Show hiragana, choose matching katakana
    const pairs = [
      { h: 'あ', k: 'ア' }, { h: 'い', k: 'イ' }, { h: 'う', k: 'ウ' }, { h: 'え', k: 'エ' }, { h: 'お', k: 'オ' },
      { h: 'か', k: 'カ' }, { h: 'き', k: 'キ' }, { h: 'く', k: 'ク' }, { h: 'け', k: 'ケ' }, { h: 'こ', k: 'コ' },
      { h: 'さ', k: 'サ' }, { h: 'し', k: 'シ' }, { h: 'す', k: 'ス' }, { h: 'せ', k: 'セ' }, { h: 'そ', k: 'ソ' },
      { h: 'た', k: 'タ' }, { h: 'ち', k: 'チ' }, { h: 'つ', k: 'ツ' }, { h: 'て', k: 'テ' }, { h: 'と', k: 'ト' },
      { h: 'な', k: 'ナ' }, { h: 'に', k: 'ニ' }, { h: 'ぬ', k: 'ヌ' }, { h: 'ね', k: 'ネ' }, { h: 'の', k: 'ノ' },
    ];
    const correct = pairs[Math.floor(Math.random() * pairs.length)];
    const wrongs = pairs.filter(p => p.k !== correct.k);
    shuffleArray(wrongs);
    const choices = shuffleArray([correct.k, wrongs[0].k, wrongs[1].k]);
    quizData = { type: 'direction', question: correct.h,
      questionLabel: 'おなじ もじの カタカナは？', choices,
      correctIndex: choices.indexOf(correct.k), disabledChoices: [] };

  } else if (type === 'sequence') {
    // Number sequence: _, 2, 3 or 3, _, 5
    const start = 1 + Math.floor(Math.random() * (stageId >= 70 ? 15 : 8));
    const pos = Math.floor(Math.random() * 3); // which position is blank
    const nums = [start, start + 1, start + 2];
    const answer = nums[pos];
    const display = nums.map((n, i) => i === pos ? '?' : String(n)).join(', ');
    const choices = [answer];
    while (choices.length < 3) {
      const off = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.floor(Math.random() * 2));
      const w = answer + off;
      if (w > 0 && !choices.includes(w)) choices.push(w);
    }
    shuffleArray(choices);
    quizData = { type: 'math', question: display, choices: choices.map(String),
      correctIndex: choices.indexOf(answer), disabledChoices: [] };

  } else if (type === 'multiply') {
    // Simple multiplication (times tables 1-5, gradually expanding)
    const maxTable = stageId >= 120 ? 9 : stageId >= 110 ? 7 : 5;
    const a = 2 + Math.floor(Math.random() * (maxTable - 1));
    const b = 1 + Math.floor(Math.random() * 5);
    const answer = a * b;
    // Tutorial hint for first encounters
    const hint = stageId <= 105 ? `（${a} を ${b} かい たすと...）` : '';
    const choices = [answer];
    while (choices.length < 3) {
      const off = (Math.random() < 0.5 ? 1 : -1) * (a + Math.floor(Math.random() * a));
      const wrong = answer + off;
      if (wrong > 0 && wrong <= 50 && !choices.includes(wrong)) choices.push(wrong);
    }
    shuffleArray(choices);
    quizData = { type: 'math', question: `${a} × ${b} = ?${hint ? '\n' + hint : ''}`,
      choices: choices.map(String), correctIndex: choices.indexOf(answer), disabledChoices: [] };

  } else if (type === 'divide') {
    // Simple division (result is always whole number)
    const b = 2 + Math.floor(Math.random() * (stageId >= 120 ? 7 : 4));
    const answer = 1 + Math.floor(Math.random() * 5);
    const a = b * answer;
    const hint = stageId <= 105 ? `（${a}こ を ${b}にん で わけると...）` : '';
    const choices = [answer];
    while (choices.length < 3) {
      const off = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.floor(Math.random() * 3));
      const wrong = answer + off;
      if (wrong > 0 && wrong <= 20 && !choices.includes(wrong)) choices.push(wrong);
    }
    shuffleArray(choices);
    quizData = { type: 'math', question: `${a} ÷ ${b} = ?${hint ? '\n' + hint : ''}`,
      choices: choices.map(String), correctIndex: choices.indexOf(answer), disabledChoices: [] };

  } else if (type === 'kanji') {
    // Small 1 basic kanji - show kanji, choose reading
    const kanjiList = [
      { kanji: '一', reading: 'いち', wrongs: ['に', 'さん'] },
      { kanji: '二', reading: 'に', wrongs: ['いち', 'さん'] },
      { kanji: '三', reading: 'さん', wrongs: ['に', 'し'] },
      { kanji: '四', reading: 'し', wrongs: ['さん', 'ご'] },
      { kanji: '五', reading: 'ご', wrongs: ['し', 'ろく'] },
      { kanji: '六', reading: 'ろく', wrongs: ['ご', 'なな'] },
      { kanji: '七', reading: 'なな', wrongs: ['ろく', 'はち'] },
      { kanji: '八', reading: 'はち', wrongs: ['なな', 'きゅう'] },
      { kanji: '九', reading: 'きゅう', wrongs: ['はち', 'じゅう'] },
      { kanji: '十', reading: 'じゅう', wrongs: ['きゅう', 'いち'] },
      { kanji: '日', reading: 'ひ', wrongs: ['つき', 'ほし'] },
      { kanji: '月', reading: 'つき', wrongs: ['ひ', 'ほし'] },
      { kanji: '火', reading: 'ひ', wrongs: ['みず', 'き'] },
      { kanji: '水', reading: 'みず', wrongs: ['ひ', 'つち'] },
      { kanji: '木', reading: 'き', wrongs: ['はな', 'くさ'] },
      { kanji: '金', reading: 'かね', wrongs: ['つち', 'みず'] },
      { kanji: '土', reading: 'つち', wrongs: ['かね', 'みず'] },
      { kanji: '山', reading: 'やま', wrongs: ['かわ', 'うみ'] },
      { kanji: '川', reading: 'かわ', wrongs: ['やま', 'うみ'] },
      { kanji: '花', reading: 'はな', wrongs: ['き', 'くさ'] },
      { kanji: '犬', reading: 'いぬ', wrongs: ['ねこ', 'とり'] },
      { kanji: '大', reading: 'おおきい', wrongs: ['ちいさい', 'ながい'] },
      { kanji: '小', reading: 'ちいさい', wrongs: ['おおきい', 'みじかい'] },
      { kanji: '上', reading: 'うえ', wrongs: ['した', 'なか'] },
      { kanji: '下', reading: 'した', wrongs: ['うえ', 'そと'] },
      { kanji: '左', reading: 'ひだり', wrongs: ['みぎ', 'うえ'] },
      { kanji: '右', reading: 'みぎ', wrongs: ['ひだり', 'した'] },
      { kanji: '目', reading: 'め', wrongs: ['みみ', 'くち'] },
      { kanji: '耳', reading: 'みみ', wrongs: ['め', 'て'] },
      { kanji: '口', reading: 'くち', wrongs: ['め', 'みみ'] },
    ];
    const item = kanjiList[Math.floor(Math.random() * kanjiList.length)];
    const choices = shuffleArray([item.reading, ...item.wrongs]);
    quizData = { type: 'direction', question: item.kanji,
      questionLabel: 'この かんじの よみかたは？', choices,
      correctIndex: choices.indexOf(item.reading), disabledChoices: [] };

  } else {
    // Picture-name quiz from unified pool
    // Only use items with AI images
    const withImages = PICTURE_QUIZ_ALL.filter(p => p.drawing);
    let item;
    do {
      item = withImages[Math.floor(Math.random() * withImages.length)];
    } while (item.word === lastQuizKey && withImages.length > 1);
    const choices = shuffleArray([item.word, ...item.wrongs]);
    lastQuizKey = item.word;
    lastQuizType = 'picture';

    quizData = {
      type: 'picture',
      question: item.word,
      drawing: item.drawing || null,
      questionLabel: 'この え の なまえは？',
      choices,
      correctIndex: choices.indexOf(item.word),
      disabledChoices: []
    };
  }
  lastQuizType = type;
  quizAttempt = 0;
  selectedAnswer = -1;
}

// 1 material per stage, sequential: S1→mat[0], S2→mat[1], ... S165→mat[164]
function getStageDrops(stageId) {
  const idx = stageId - 1;
  if (idx >= 0 && idx < MATERIALS.length) return [MATERIALS[idx]];
  return [];
}

// 3-stage synthesis: 5/15=head, 10/15=body, 15/15=complete
// Key items per card (created at 5/15 and 10/15 milestones)
const KEY_ITEMS = {
  koguma:      ['こぐまのマフラー', 'こぐまのぼうし'],
  osanpo:      ['おさんぽバスケット', 'おさんぽちず'],
  hoshizora:   ['ほしのペンダント', 'よぞらのマント'],
  oyogu:       ['うみのゴーグル', 'しおかぜのうきわ'],
  oyasumi:     ['ゆめのオルゴール', 'ねむりのティアラ'],
  tanken:      ['ぼうけんのバッジ', 'たからばこのカギ'],
  ousama:      ['おうのしるし', 'きんのメダリオン'],
  mahoutsukai: ['まほうのけっしょう', 'ふしぎなグリモワール'],
  ouji:        ['オーロラのブローチ', 'そらのかんむり'],
  uchuu:       ['ぎんがのコンパス', 'うちゅうのパスポート'],
  densetsu:    ['でんせつのかけら', 'きせきのしょうめい'],
};

function checkAutoSynth() {
  for (const recipe of RECIPES) {
    const owned = recipe.materials.filter(m => saveData.ownedMaterials[m.id]).length;
    const currentLevel = saveData.completedCards[recipe.id] || 0;
    const keys = KEY_ITEMS[recipe.id] || ['キーアイテム1', 'キーアイテム2'];

    if (owned >= 15 && currentLevel < 3) {
      synthCards = recipe.materials.slice(10, 15).map(m => m.id);
      saveData.completedCards[recipe.id] = 3;
      saveGame();
      return { ...recipe, synthLevel: 3, synthLabel: 'かんせい！' };
    } else if (owned >= 10 && currentLevel < 2) {
      synthCards = recipe.materials.slice(5, 10).map(m => m.id);
      saveData.completedCards[recipe.id] = 2;
      saveData.ownedMaterials[recipe.id + '_key2'] = true;
      saveGame();
      return { ...recipe, synthLevel: 2, synthLabel: `「${keys[1]}」ができた！` };
    } else if (owned >= 5 && currentLevel < 1) {
      synthCards = recipe.materials.slice(0, 5).map(m => m.id);
      saveData.completedCards[recipe.id] = 1;
      saveData.ownedMaterials[recipe.id + '_key1'] = true;
      saveGame();
      return { ...recipe, synthLevel: 1, synthLabel: `「${keys[0]}」ができた！` };
    }
  }
  return null;
}

function updateGame() {
  sceneTimer++;

  if (gamePhase === 'quiz') {
    if (inputTapped && quizData) {
      // Check 3 answer buttons
      for (let i = 0; i < 3; i++) {
        if (quizData.disabledChoices.includes(i)) continue;
        const bx = 40, by = 440 + i * 65, bw = 320, bh = 55;
        if (hitRect(inputX, inputY, bx, by, bw, bh)) {
          selectedAnswer = i;
          if (i === quizData.correctIndex) {
            // Correct!
            sfxCorrect();
            saveData.stats.totalQuestions++;
            saveData.stats.totalCorrect++;
            rocketCount++;
            // Bonus chance
            if (Math.random() < 0.3) rocketCount++;
            questionsNeeded--;
            gamePhase = 'quizResult';
            quizResultTimer = 60;
          } else {
            // Wrong
            sfxWrong();
            saveData.stats.totalQuestions++;
            quizAttempt++;
            if (quizAttempt >= 2) {
              // Give rocket anyway, show correct
              rocketCount++;
              questionsNeeded--;
              gamePhase = 'quizResult';
              quizResultTimer = 90; // longer to show correct answer
            } else {
              // Hint: disable this choice
              quizData.disabledChoices.push(i);
              gamePhase = 'quizResult';
              quizResultTimer = 45;
            }
          }
        }
      }
    }
  } else if (gamePhase === 'quizResult') {
    quizResultTimer--;
    if (quizResultTimer <= 0) {
      if (quizAttempt < 2 && selectedAnswer !== quizData.correctIndex) {
        // Back to same quiz with hint
        gamePhase = 'quiz';
        selectedAnswer = -1;
      } else {
        // Got rocket(s) - auto-fire one immediately
        gamePhase = 'rocketFire';
        sfxLaunch();
        rocketCount--;
        rocketAnim = { x: DESIGN_W / 2, y: 580, targetY: 160, progress: 0 };
      }
    }
  } else if (gamePhase === 'rocketReady') {
    // Bonus: tap anywhere to fire all remaining rockets rapidly
    if (inputTapped && rocketCount > 0) {
      isBonus = true;
      // Launch all remaining rockets with staggered timing
      while (rocketCount > 0) {
        rocketCount--;
        const spread = (Math.random() - 0.5) * 60;
        rocketQueue.push({
          x: DESIGN_W / 2 + spread, y: 580,
          targetY: 150 + Math.random() * 20,
          progress: -rocketQueue.length * 0.08, // stagger start
        });
      }
      sfxLaunch();
      gamePhase = 'rocketFire';
    } else if (rocketCount <= 0) {
      generateQuiz();
      gamePhase = 'quiz';
    }
  } else if (gamePhase === 'rocketFire') {
    // Update single rocket (from quiz answer)
    if (rocketAnim) {
      rocketAnim.progress += 0.04;
      rocketAnim.y = 580 + (rocketAnim.targetY - 580) * Math.min(1, rocketAnim.progress);
      if (sceneTimer % 2 === 0) {
        addParticle(rocketAnim.x + (Math.random()-0.5)*6, rocketAnim.y + 15,
          'shard', `hsl(${30+Math.random()*30}, 100%, ${50+Math.random()*30}%)`,
          (Math.random()-0.5)*2, 2 + Math.random()*2, 20);
      }
      if (rocketAnim.progress >= 1) {
        sfxHit();
        triggerShake(4, 10);
        const damage = iceMaxHP / currentStage.rockets;
        iceHP = Math.max(0, iceHP - damage);
        spawnIceShards(DESIGN_W / 2, 180, 12);
        rocketAnim = null;
      }
    }

    // Update bonus rocket queue
    for (let i = rocketQueue.length - 1; i >= 0; i--) {
      const r = rocketQueue[i];
      r.progress += 0.05;
      if (r.progress >= 0) {
        r.y = 580 + (r.targetY - 580) * Math.min(1, r.progress);
        if (sceneTimer % 2 === 0) {
          addParticle(r.x + (Math.random()-0.5)*6, r.y + 15,
            'shard', `hsl(${30+Math.random()*30}, 100%, ${50+Math.random()*30}%)`,
            (Math.random()-0.5)*2, 2 + Math.random()*2, 20);
        }
      }
      if (r.progress >= 1) {
        sfxHit();
        triggerShake(3, 6);
        const damage = iceMaxHP / currentStage.rockets;
        iceHP = Math.max(0, iceHP - damage);
        spawnIceShards(DESIGN_W / 2 + (Math.random()-0.5)*40, 180, 8);
        rocketQueue.splice(i, 1);
      }
    }

    // Check if all rockets done
    if (!rocketAnim && rocketQueue.length === 0) {
      isBonus = false;
      if (iceHP <= 0) {
        sfxBreak();
        triggerShake(8, 20);
        spawnIceShards(DESIGN_W / 2, 180, 30);
        gamePhase = 'iceBreak';
        sceneTimer = 0;
      } else if (rocketCount > 0) {
        gamePhase = 'rocketReady';
      } else {
        generateQuiz();
        gamePhase = 'quiz';
      }
    }
  } else if (gamePhase === 'iceBreak') {
    if (sceneTimer > 40) {
      sfxRescue();
      gamePhase = 'rescue';
      bearRunX = DESIGN_W / 2;
      bearRunTimer = 0;
      spawnHearts(DESIGN_W / 2, 200, 8);
    }
  } else if (gamePhase === 'rescue') {
    bearRunTimer++;
    bearRunX += 2.5;
    spawnSparkles(bearRunX, 200, 1);
    if (bearRunTimer > 80) {
      // Drop cards (fixed per stage, 1 unique material)
      droppedCards = getStageDrops(currentStage.id);
      for (const mat of droppedCards) {
        saveData.ownedMaterials[mat.id] = true;
      }
      // Mark stage as cleared
      if (!saveData.clearedStages.includes(currentStage.id)) {
        saveData.clearedStages.push(currentStage.id);
      }
      saveGame();
      sfxCardGet();
      gamePhase = 'cardGet';
      cardGetTimer = 0;
    }
  } else if (gamePhase === 'cardGet') {
    cardGetTimer++;
    if (cardGetTimer > 30) {
      spawnSparkles(DESIGN_W / 2, 350, 2);
    }
    if (inputTapped && cardGetTimer > 60) {
      // Check for auto synthesis
      synthResult = checkAutoSynth();
      if (synthResult) {
        gamePhase = 'synthesis';
        synthTimer = 0;
        synthPhase = 0; // start with showing materials
        // Play a subtle hint sound
        playTone(440, 0.15, 'triangle', 0.2);
      } else {
        goToStageSelect();
      }
    }
  } else if (gamePhase === 'synthesis') {
    synthTimer++;
    if (synthPhase === 0 && synthTimer > 50) {
      // Materials shown long enough, start merge
      synthPhase = 1;
      synthTimer = 0;
      playTone(523, 0.2, 'sine', 0.2);
    } else if (synthPhase === 1 && synthTimer > 40) {
      // Merge done, reveal card
      synthPhase = 2;
      synthTimer = 0;
      sfxSynth();
      spawnSparkles(DESIGN_W / 2, 320, 40);
      spawnHearts(DESIGN_W / 2, 320, 5);
    } else if (synthPhase === 2) {
      if (synthTimer < 30) spawnSparkles(DESIGN_W / 2, 320, 2);
      if (inputTapped && synthTimer > 60) {
        // Check for another synthesis
        const nextSynth = checkAutoSynth();
        if (nextSynth) {
          synthResult = nextSynth;
          synthTimer = 0;
          synthPhase = 0;
          playTone(440, 0.15, 'triangle', 0.2);
        } else {
          goToStageSelect();
        }
      }
    }
  }
}

function goToStageSelect() {
  scene = 'stageSelect';
  // Auto-advance to next world if current world is fully cleared
  const clearedInWorld = saveData.clearedStages.filter(
    s => s >= currentWorld * STAGES_PER_WORLD + 1 && s <= (currentWorld + 1) * STAGES_PER_WORLD
  ).length;
  if (clearedInWorld >= STAGES_PER_WORLD && currentWorld + 1 < WORLDS.length) {
    currentWorld++;
  }
  stageScrollY = 0; stageScrollTarget = 0;
}

function drawGame() {
  // Background - matches current world
  const grad = ctx.createLinearGradient(0, 0, 0, DESIGN_H);
  const worldIdx = getWorldForStage(currentStage.id);
  const w = WORLDS[Math.min(worldIdx, WORLDS.length - 1)];
  grad.addColorStop(0, w.bg1); grad.addColorStop(1, w.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

  // Stage label
  ctx.fillStyle = w.text;
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`ステージ ${currentStage.id}`, 15, 30);

  // Rocket count (draw rocket icon instead of emoji)
  ctx.textAlign = 'right';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillStyle = '#FF5722';
  drawRocket(DESIGN_W - 55, 22, 10);
  ctx.fillStyle = '#1565C0';
  ctx.fillText(`x ${rocketCount}`, DESIGN_W - 15, 30);

  // Ice HP bar
  const barX = 40, barY = 55, barW = DESIGN_W - 80, barH = 14;
  ctx.fillStyle = '#B0BEC5';
  drawRoundRect(barX, barY, barW, barH, 7);
  ctx.fill();
  const hpRatio = iceHP / iceMaxHP;
  if (hpRatio > 0) {
    ctx.fillStyle = hpRatio > 0.5 ? '#4FC3F7' : hpRatio > 0.2 ? '#FFB74D' : '#EF5350';
    drawRoundRect(barX, barY, barW * hpRatio, barH, 7);
    ctx.fill();
  }
  ctx.fillStyle = '#546E7A';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('こおりのつよさ', DESIGN_W / 2, barY + barH + 14);

  // Ice block + bear
  if (iceHP > 0) {
    const iceX = DESIGN_W / 2 - 80, iceY = 100, iceW = 160, iceH = 180;
    // Bear behind ice (visible but muted)
    ctx.globalAlpha = 0.7;
    drawBear(DESIGN_W / 2, 200, 45);
    ctx.globalAlpha = 1;
    // Ice
    const crackLevel = Math.floor((1 - hpRatio) * 8);
    drawIceBlock(iceX, iceY, iceW, iceH, hpRatio, crackLevel);
  } else if (gamePhase === 'iceBreak') {
    // Bear celebrating
    drawBear(DESIGN_W / 2, 200, 45, true);
  } else if (gamePhase === 'rescue') {
    // Bear running
    drawBear(bearRunX, 200, 45, true);
  }

  // Rocket animations
  if (rocketAnim) {
    drawRocket(rocketAnim.x, rocketAnim.y, 20);
  }
  for (const r of rocketQueue) {
    if (r.progress >= 0) {
      drawRocket(r.x, r.y, 18);
    }
  }

  // Quiz area
  if (gamePhase === 'quiz' || gamePhase === 'quizResult') {
    if (quizData) {
      // Question
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      drawRoundRect(30, 310, DESIGN_W - 60, 100, 12);
      ctx.fill();

      if (quizData.type === 'math') {
        ctx.textAlign = 'center';
        const lines = quizData.question.split('\n');
        ctx.fillStyle = '#333';
        ctx.font = 'bold 36px sans-serif';
        ctx.fillText(lines[0], DESIGN_W / 2, lines.length > 1 ? 355 : 370);
        if (lines.length > 1) {
          ctx.fillStyle = '#999';
          ctx.font = '14px sans-serif';
          ctx.fillText(lines[1], DESIGN_W / 2, 395);
        }
      } else if (quizData.type === 'direction') {
        ctx.fillStyle = '#333';
        ctx.font = 'bold 50px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(quizData.question, DESIGN_W / 2, 365);
        ctx.fillStyle = '#666';
        ctx.font = 'bold 18px sans-serif';
        ctx.fillText(quizData.questionLabel, DESIGN_W / 2, 400);
      } else if (quizData.type === 'counting' || quizData.type === 'counting_mixed') {
        const isMixed = quizData.type === 'counting_mixed';
        const totalRed = isMixed ? quizData.targetCount : quizData.count;
        const totalBlue = isMixed ? quizData.otherCount : 0;
        const total = totalRed + totalBlue;
        // Shuffle positions
        const items = [];
        for (let ci = 0; ci < totalRed; ci++) items.push('#EF5350');
        for (let ci = 0; ci < totalBlue; ci++) items.push('#42A5F5');
        shuffleArray(items);
        const cols = Math.min(5, total);
        const rows = Math.ceil(total / cols);
        for (let ci = 0; ci < total; ci++) {
          const col = ci % cols, row = Math.floor(ci / cols);
          const ox = DESIGN_W/2 - (cols-1)*18 + col*36;
          const oy = 345 - (rows-1)*14 + row*28;
          ctx.fillStyle = items[ci];
          ctx.beginPath(); ctx.arc(ox, oy, 10, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = '#666'; ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center'; ctx.fillText(quizData.question, DESIGN_W/2, 400);
      } else if (quizData.type === 'compare_size') {
        const bigR = 28, smallR = 14;
        const leftR = quizData.bigSide === 'ひだり' ? bigR : smallR;
        const rightR = quizData.bigSide === 'みぎ' ? bigR : smallR;
        ctx.fillStyle = '#FF7043';
        ctx.beginPath(); ctx.arc(DESIGN_W/2 - 60, 355, leftR, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#42A5F5';
        ctx.beginPath(); ctx.arc(DESIGN_W/2 + 60, 355, rightR, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#666'; ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center'; ctx.fillText(quizData.question, DESIGN_W/2, 400);
      } else if (quizData.type === 'compare_length') {
        const longW = 100, shortW = 40;
        const leftW = quizData.longSide === 'ひだり' ? longW : shortW;
        const rightW = quizData.longSide === 'みぎ' ? longW : shortW;
        ctx.fillStyle = '#FF7043';
        ctx.fillRect(DESIGN_W/2 - 120, 350, leftW, 12);
        ctx.fillStyle = '#42A5F5';
        ctx.fillRect(DESIGN_W/2 + 20, 350, rightW, 12);
        ctx.fillStyle = '#666'; ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center'; ctx.fillText(quizData.question, DESIGN_W/2, 400);
      } else if (quizData.type === 'compare_many') {
        // Left dots
        for (let ci = 0; ci < quizData.leftCount; ci++) {
          ctx.fillStyle = '#FF7043';
          ctx.beginPath(); ctx.arc(DESIGN_W/2 - 80 + (ci%3)*18, 340 + Math.floor(ci/3)*20, 7, 0, Math.PI*2); ctx.fill();
        }
        // Right dots
        for (let ci = 0; ci < quizData.rightCount; ci++) {
          ctx.fillStyle = '#42A5F5';
          ctx.beginPath(); ctx.arc(DESIGN_W/2 + 40 + (ci%3)*18, 340 + Math.floor(ci/3)*20, 7, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = '#666'; ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center'; ctx.fillText(quizData.question, DESIGN_W/2, 400);
      } else if (quizData.type === 'color') {
        // Draw a big colored circle
        ctx.fillStyle = quizData.colorHex;
        ctx.beginPath(); ctx.arc(DESIGN_W/2, 350, 30, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#666'; ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center'; ctx.fillText(quizData.question, DESIGN_W/2, 400);
      } else if (quizData.type === 'shape') {
        ctx.fillStyle = '#4FC3F7'; ctx.strokeStyle = '#1565C0'; ctx.lineWidth = 2;
        const cx = DESIGN_W/2, cy = 350, r = 25;
        if (quizData.shapeDraw === 'circle') { ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); ctx.stroke(); }
        else if (quizData.shapeDraw === 'triangle') { ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.lineTo(cx-r,cy+r); ctx.lineTo(cx+r,cy+r); ctx.closePath(); ctx.fill(); ctx.stroke(); }
        else if (quizData.shapeDraw === 'square') { ctx.fillRect(cx-r,cy-r,r*2,r*2); ctx.strokeRect(cx-r,cy-r,r*2,r*2); }
        else if (quizData.shapeDraw === 'star_shape') { ctx.beginPath(); for(let j=0;j<10;j++){const a=(j*36-90)*Math.PI/180;const sr=j%2===0?r:r*0.4;if(j===0)ctx.moveTo(cx+Math.cos(a)*sr,cy+Math.sin(a)*sr);else ctx.lineTo(cx+Math.cos(a)*sr,cy+Math.sin(a)*sr);}ctx.closePath(); ctx.fill(); ctx.stroke(); }
        else if (quizData.shapeDraw === 'heart_shape') { ctx.beginPath(); ctx.moveTo(cx,cy+r*0.7); ctx.bezierCurveTo(cx-r*1.5,cy-r*0.3,cx-r*0.5,cy-r*1.2,cx,cy-r*0.5); ctx.bezierCurveTo(cx+r*0.5,cy-r*1.2,cx+r*1.5,cy-r*0.3,cx,cy+r*0.7); ctx.fill(); ctx.stroke(); }
        ctx.fillStyle = '#666'; ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center'; ctx.fillText(quizData.question, DESIGN_W/2, 400);
      } else {
        // Picture-name quiz: show picture, choose name
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        drawRoundRect(30, 310, DESIGN_W - 60, 115, 12);
        ctx.fill();
        if (quizData.drawing) {
          drawWordPicture(DESIGN_W / 2, 355, quizData.drawing, 80);
        } else {
          // No AI image: show word's first char large as hint
          ctx.fillStyle = '#FF7043';
          ctx.font = 'bold 48px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(quizData.question[0] + '...', DESIGN_W / 2, 365);
        }
        ctx.fillStyle = '#666';
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(quizData.questionLabel, DESIGN_W / 2, 410);
      }

      // Answer buttons
      for (let i = 0; i < 3; i++) {
        const bx = 40, by = 440 + i * 65, bw = 320, bh = 55;
        const disabled = quizData.disabledChoices.includes(i);
        let color = '#4FC3F7';
        let textCol = '#FFF';

        if (gamePhase === 'quizResult') {
          if (i === quizData.correctIndex) {
            color = '#66BB6A'; // green for correct
          } else if (i === selectedAnswer && selectedAnswer !== quizData.correctIndex) {
            color = '#EF5350'; // red for wrong
          }
        }
        if (disabled && gamePhase !== 'quizResult') {
          color = '#B0BEC5';
          textCol = '#78909C';
        }

        drawButton(bx, by, bw, bh, quizData.choices[i], color, textCol, 28);
      }

      // Feedback message
      if (gamePhase === 'quizResult') {
        ctx.font = 'bold 22px sans-serif';
        ctx.textAlign = 'center';
        if (selectedAnswer === quizData.correctIndex) {
          ctx.fillStyle = '#2E7D32';
          ctx.fillText('せいかい！ロケット GET！', DESIGN_W / 2, 430);
        } else if (quizAttempt >= 2) {
          ctx.fillStyle = '#E65100';
          ctx.fillText('こたえは これだよ！ロケット1つ！', DESIGN_W / 2, 430);
        } else {
          ctx.fillStyle = '#F57C00';
          ctx.fillText('おしい！もういっかい！', DESIGN_W / 2, 430);
        }
      }
    }
  }

  // Rocket ready phase (bonus rockets)
  if (gamePhase === 'rocketReady' && rocketCount > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    drawRoundRect(30, 420, DESIGN_W - 60, 80, 12);
    ctx.fill();
    ctx.fillStyle = '#1565C0';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('ボーナス ロケット！', DESIGN_W / 2, 450);
    ctx.fillText('タップして はっしゃ！', DESIGN_W / 2, 480);

    // Draw rockets at bottom
    for (let i = 0; i < Math.min(rocketCount, 8); i++) {
      const rx = DESIGN_W / 2 - (Math.min(rocketCount, 8) * 19) + i * 38;
      drawRocket(rx, 560, 18);
    }

    // Pulsing hint
    const pulse = Math.sin(sceneTimer * 0.1) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#FF5722';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('どこでも タップ！', DESIGN_W / 2, 620);
    ctx.globalAlpha = 1;
  }

  // Card get phase
  if (gamePhase === 'cardGet') {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    // World clear check (every 30 stages)
    if (currentStage.id % STAGES_PER_WORLD === 0) {
      const wIdx = getWorldForStage(currentStage.id);
      const wName = WORLDS[Math.min(wIdx, WORLDS.length - 1)].name;
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 28px sans-serif';
      ctx.fillText(`${wName} クリア！`, DESIGN_W / 2, 130);
      if (wIdx + 1 < WORLDS.length) {
        const nextW = WORLDS[wIdx + 1];
        const pulse = Math.sin(sceneTimer * 0.08) * 0.3 + 0.7;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 20px sans-serif';
        ctx.fillText(`つぎ: ${nextW.name} かいほう！`, DESIGN_W / 2, 165);
        ctx.globalAlpha = 1;
      }
      if (cardGetTimer < 60) spawnSparkles(DESIGN_W / 2, 140, 5);
    } else if (currentStage.id % 10 === 0) {
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 30px sans-serif';
      ctx.fillText(`${currentStage.id}めん クリア！`, DESIGN_W / 2, 160);
      if (cardGetTimer < 60) spawnSparkles(DESIGN_W / 2, 160, 3);
    }
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 28px sans-serif';
    ctx.fillText('カード GET！', DESIGN_W / 2, 200);

    // Show dropped cards
    const totalW = droppedCards.length * 110;
    const startX = (DESIGN_W - totalW) / 2 + 10;
    for (let i = 0; i < droppedCards.length; i++) {
      const mat = droppedCards[i];
      const cardY = 240 + Math.sin(cardGetTimer * 0.05 + i) * 5;
      drawCard(startX + i * 110, cardY, 90, 120, '', mat.name, '#4FC3F7', true, mat.id);
    }

    if (cardGetTimer > 60) {
      const pulse = Math.sin(sceneTimer * 0.1) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#FFF';
      ctx.font = '20px sans-serif';
      ctx.fillText('タップして つぎへ', DESIGN_W / 2, 500);
      ctx.globalAlpha = 1;
    }
  }

  // Synthesis phase - 3-step animation
  if (gamePhase === 'synthesis' && synthResult) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';

    if (synthPhase === 0) {
      // Phase 0: Show material cards being consumed
      ctx.fillText('ごうせい はつどう！', DESIGN_W / 2, 140);
      const n = synthCards.length;
      const spacing = Math.min(80, (DESIGN_W - 60) / n);
      const startX = DESIGN_W / 2 - (n - 1) * spacing / 2 - 30;
      for (let i = 0; i < n; i++) {
        const matId = synthCards[i];
        const cx = startX + i * spacing;
        // Slight bobbing
        const bob = Math.sin(sceneTimer * 0.08 + i) * 4;
        drawCard(cx, 180 + bob, 60, 75, '', '', '#4FC3F7', false, matId);
      }
      // Arrow pointing down
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 40px sans-serif';
      const arrowPulse = Math.sin(sceneTimer * 0.15) * 5;
      ctx.fillText('▼', DESIGN_W / 2, 290 + arrowPulse);

      // Show target card outline (mystery)
      ctx.strokeStyle = 'rgba(255,215,0,0.5)';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      drawRoundRect(DESIGN_W / 2 - 55, 320, 110, 150, 8);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(255,215,0,0.3)';
      ctx.font = 'bold 40px sans-serif';
      ctx.fillText('?', DESIGN_W / 2, 405);

    } else if (synthPhase === 1) {
      // Phase 1: Cards merge toward center
      ctx.fillText('ごうせい ちゅう...', DESIGN_W / 2, 140);
      const n = synthCards.length;
      const progress = Math.min(1, synthTimer / 35);
      const eased = 1 - (1 - progress) * (1 - progress); // ease-out
      for (let i = 0; i < n; i++) {
        const matId = synthCards[i];
        const spacing = Math.min(80, (DESIGN_W - 60) / n);
        const startX = DESIGN_W / 2 - (n - 1) * spacing / 2 - 30 + i * spacing;
        const targetX = DESIGN_W / 2 - 30;
        const cx = startX + (targetX - startX) * eased;
        const cy = 180 + (320 - 180) * eased;
        const cardScale = 1 - eased * 0.3;
        const cardAlpha = 1 - eased * 0.5;
        ctx.globalAlpha = cardAlpha;
        drawCard(cx, cy, 60 * cardScale, 75 * cardScale, '', '', '#FFD700', true, matId);
        ctx.globalAlpha = 1;
      }
      // Glow at center growing
      if (progress > 0.5) {
        const glowSize = (progress - 0.5) * 2 * 60;
        const grad = ctx.createRadialGradient(DESIGN_W/2, 360, 0, DESIGN_W/2, 360, glowSize);
        grad.addColorStop(0, 'rgba(255,215,0,0.6)');
        grad.addColorStop(1, 'rgba(255,215,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(DESIGN_W/2 - glowSize, 360 - glowSize, glowSize*2, glowSize*2);
      }

    } else if (synthPhase === 2) {
      // Phase 2: Reveal - varies by synthLevel
      const sl = synthResult.synthLevel || 3;
      ctx.fillText(synthResult.synthLabel || 'かんせい！', DESIGN_W / 2, 160);

      const revealProgress = Math.min(1, synthTimer / 20);
      const cardScale = 0.5 + revealProgress * 0.5;
      const cardW = (sl === 3 ? 130 : 100) * cardScale;
      const cardH = (sl === 3 ? 180 : 130) * cardScale;

      if (sl === 3) {
        // Full card with bear image
        drawCard(DESIGN_W / 2 - cardW / 2, 200, cardW, cardH, '', synthResult.name, synthResult.color, true);
        drawCardBear(DESIGN_W / 2, 200 + cardH * 0.38, cardH * 0.5 * cardScale, synthResult.id);
      } else {
        // Key item created - show key item image
        const keyImgId = synthResult.id + '_key' + sl;
        const keyImg = KEY_ITEM_IMG_CACHE[keyImgId];
        const imgSize = 90 * cardScale;
        // Card frame
        const partColor = sl === 1 ? '#81C784' : '#FFB74D';
        drawCard(DESIGN_W / 2 - cardW / 2, 200, cardW, cardH, '', '', partColor, true);
        // Key item image
        if (keyImg && keyImg.complete) {
          ctx.drawImage(keyImg, DESIGN_W / 2 - imgSize / 2, 215, imgSize, imgSize);
        }
        // Progress
        ctx.fillStyle = '#333'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(`${sl}/3`, DESIGN_W / 2, 215 + imgSize + 18);
      }

      // Label
      ctx.fillStyle = synthResult.color === '#E0E0E0' ? '#666' : synthResult.color;
      ctx.font = 'bold 22px sans-serif';
      ctx.fillText(`${synthResult.stars} ${synthResult.name}`, DESIGN_W / 2, sl === 3 ? 420 : 380);

      if (sl === 3) {
        ctx.fillStyle = '#FF5722';
        ctx.font = 'bold 26px sans-serif';
        const newPulse = Math.sin(sceneTimer * 0.12) * 3;
        ctx.fillText('NEW!', DESIGN_W / 2, 455 + newPulse);
      }

      if (synthTimer > 60) {
        const pulse = Math.sin(sceneTimer * 0.1) * 0.3 + 0.7;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#FFF';
        ctx.font = '20px sans-serif';
        ctx.fillText('タップして つぎへ', DESIGN_W / 2, 550);
        ctx.globalAlpha = 1;
      }
    }
  }

  // Particles on top
  drawParticles();
}

// ============================================================
// 13. Album (Card Collection) Scene
// ============================================================
let albumFrom = 'title';
let albumScrollY = 0;
let albumScrollTarget = 0;
let albumDragStartY = -1;
let albumDragLastY = -1;

function updateAlbum() {
  // Smooth scroll
  albumScrollY += (albumScrollTarget - albumScrollY) * 0.2;
  const contentH = 90 + RECIPES.length * 100 + 60;
  const maxScroll = Math.max(0, contentH - 580);
  albumScrollTarget = Math.max(0, Math.min(maxScroll, albumScrollTarget));
  albumScrollY = Math.max(0, Math.min(maxScroll, albumScrollY));

  if (inputTapped) {
    const dragDist = albumDragStartY >= 0 ? Math.abs(inputY - albumDragStartY) : 0;
    if (dragDist < 10 && hitRect(inputX, inputY, 20, 640, 120, 45)) {
      sfxButton();
      scene = albumFrom;
      albumScrollY = 0; albumScrollTarget = 0;
    }
  }
}

function drawAlbum() {
  const grad = ctx.createLinearGradient(0, 0, 0, DESIGN_H);
  grad.addColorStop(0, '#FFF3E0');
  grad.addColorStop(1, '#FFE0B2');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

  ctx.fillStyle = '#E65100';
  ctx.font = 'bold 26px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('カード ずかん', DESIGN_W / 2, 40);

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 55, DESIGN_W, 580);
  ctx.clip();

  const oY = -albumScrollY;

  // Collection view: each card with its materials
  let curY = 70 + oY;
  const totalMats = MATERIALS.length;
  const ownedMats = MATERIALS.filter(m => saveData.ownedMaterials[m.id]).length;
  const totalCards = RECIPES.length;
  const ownedCards = RECIPES.filter(r => (saveData.completedCards[r.id] || 0) >= 3).length;

  ctx.fillStyle = '#795548'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`そざい ${ownedMats}/${totalMats}　かんせい ${ownedCards}/${totalCards}`, DESIGN_W/2, curY);
  curY += 20;

  for (const recipe of RECIPES) {
    if (curY + oY > -200 && curY < 800) {
      const cardLevel = saveData.completedCards[recipe.id] || 0; // 0-3

      // Card header
      ctx.fillStyle = recipe.color === '#E0E0E0' ? '#666' : recipe.color;
      ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(`${recipe.stars} ${recipe.name}`, 20, curY);
      if (cardLevel >= 3) {
        ctx.fillStyle = '#2E7D32'; ctx.font = 'bold 12px sans-serif';
        ctx.fillText('かんせい！', DESIGN_W - 90, curY);
      } else if (cardLevel > 0) {
        ctx.fillStyle = '#FF8F00'; ctx.font = 'bold 12px sans-serif';
        ctx.fillText(`${cardLevel}/3`, DESIGN_W - 55, curY);
      }
      curY += 8;

      // Card image
      if (cardLevel >= 3) {
        drawCard(20, curY, 55, 65, '', '', recipe.color, true);
        drawCardBear(47, curY + 25, 40, recipe.id);
      } else {
        drawCard(20, curY, 55, 65, '', '', '#B0BEC5');
        ctx.fillStyle = '#CCC'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('?', 47, curY + 35);
      }

      // Material slots
      const mats = recipe.materials;
      const slotW = Math.min(50, (DESIGN_W - 100) / mats.length);
      for (let mi = 0; mi < mats.length; mi++) {
        const mat = mats[mi];
        const mx = 85 + mi * (slotW + 4);
        const owned = saveData.ownedMaterials[mat.id];
        // Slot box
        ctx.fillStyle = owned ? 'rgba(76,175,80,0.15)' : 'rgba(0,0,0,0.05)';
        drawRoundRect(mx, curY, slotW, 65, 6); ctx.fill();
        ctx.strokeStyle = owned ? '#66BB6A' : '#CCC'; ctx.lineWidth = 1.5;
        ctx.stroke();
        // Check or lock
        ctx.textAlign = 'center';
        if (owned) {
          ctx.fillStyle = '#66BB6A'; ctx.font = 'bold 18px sans-serif';
          ctx.fillText('✓', mx + slotW/2, curY + 25);
        } else {
          ctx.fillStyle = '#CCC'; ctx.font = '16px sans-serif';
          ctx.fillText('?', mx + slotW/2, curY + 25);
        }
        // Material name (tiny)
        ctx.fillStyle = owned ? '#555' : '#BBB';
        ctx.font = '9px sans-serif';
        const shortName = mat.name.length > 5 ? mat.name.slice(0, 5) + '..' : mat.name;
        ctx.fillText(shortName, mx + slotW/2, curY + 45);
        ctx.fillText(owned ? 'GET' : '???', mx + slotW/2, curY + 57);
      }

      curY += 78;
    } else {
      curY += 78 + 20;
    }
  }

  ctx.restore();

  drawButton(20, 640, 120, 45, 'もどる', '#78909C', '#FFF', 18);
}

// ============================================================
// 14. Main Loop
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  // Clear
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.scale(scale, scale);
  applyShake();

  sceneTimer++;

  // Update & Draw based on scene
  switch (scene) {
    case 'title':
      updateTitle();
      drawTitle();
      break;
    case 'stageSelect':
      updateStageSelect();
      drawStageSelect();
      break;
    case 'game':
      updateGame();
      drawGame();
      break;
    case 'album':
      updateAlbum();
      drawAlbum();
      break;
  }

  updateParticles();

  ctx.restore();

  // Reset input
  inputTapped = false;

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

</script>
